/* CSS Reset & Variables */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:#0f0a1e;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#1a1030}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:3px}
.cinzel{font-family:'Cinzel',serif}

/* UI Components */
@keyframes shimmer{0%{background-position:-400% center}100%{background-position:400% center}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.gold-text{background:linear-gradient(90deg,#C9A020,#E8CC6A,#C9A020);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
.spinner-sm{width:18px;height:18px;border:2px solid rgba(212,175,55,.2);border-top-color:#D4AF37;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}

.btn-gold{background:linear-gradient(135deg,#C9A020,#E8CC6A,#C9A020);background-size:200% auto;color:#180626;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1.5px;border:none;cursor:pointer;transition:all .3s;font-size:12px;padding:12px 24px;border-radius:8px}
.btn-gold:hover{background-position:right center;box-shadow:0 6px 24px rgba(212,175,55,.4);transform:translateY(-1px)}
.btn-gold:disabled{opacity:0.5;cursor:not-allowed}

.btn-danger{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;padding:8px 12px;border-radius:6px}
.btn-edit{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.3);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;padding:8px 12px;border-radius:6px}
.btn-outline{background:transparent;color:#D4AF37;font-family:'Cinzel',serif;font-weight:600;border:1px solid rgba(212,175,55,.5);cursor:pointer;transition:all .2s;font-size:11px;padding:8px 16px;border-radius:6px}

.card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:24px}
.input-field, .select-field{width:100%;padding:11px 14px;border:1px solid rgba(212,175,55,.2);border-radius:8px;background:rgba(255,255,255,.05);font-size:14px;color:#e2e8f0;outline:none}
.label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#C9A020;display:block;margin-bottom:8px;text-transform:uppercase}
.chip{padding:6px 14px;border-radius:20px;border:1px solid rgba(212,175,55,.2);background:transparent;color:#e2e8f0;cursor:pointer;font-size:12px;transition:all 0.2s}
.chip.selected{background:rgba(124,58,237,0.2);border-color:#D4AF37;color:#E8CC6A}
.select-field option {
    background-color: #160d2e; /* Matches your modal/dark theme */
    color: #e2e8f0;            /* Keeps the text light and visible */
}
/* Layout */
.sidebar{width:220px;background:rgba(255,255,255,.03);border-right:1px solid rgba(212,175,55,.1);min-height:100vh;position:fixed;left:0;top:0;padding-top:80px;z-index:10}
.sidebar-btn{display:flex;align-items:center;gap:10px;width:100%;padding:14px 20px;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-family:'Cinzel',serif;font-size:11px;border-left:3px solid transparent;text-align:left}
.sidebar-btn.active{background:rgba(124,58,237,.1);color:#E8CC6A;border-left-color:#D4AF37}

.main-content{margin-left:220px;padding:40px;min-height:100vh}

/* Tables */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid rgba(212,175,55,.12);background:rgba(255,255,255,0.01)}
table{width:100%;border-collapse:collapse}
thead th{background:rgba(59,7,100,.6);color:#E8CC6A;font-family:'Cinzel',serif;font-size:11px;padding:14px 16px;text-align:left;white-space:nowrap;position:sticky;top:0}
tbody td{padding:14px 16px;border-bottom:1px solid rgba(212,175,55,.08);font-size:13px;vertical-align:middle}
.stock-low{color:#f87171;font-weight:700}

/* Stat Cards */
.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:20px;display:flex;align-items:center;gap:15px;transition:transform 0.2s}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(212,175,55,0.3)}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px}

/* Modals */
.modal-overlay{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.85);backdrop-filter:blur(6px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-content{background:#160d2e;border:1px solid rgba(212,175,55,0.4);border-radius:16px;width:50vw;height:50vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 32px 64px rgba(0,0,0,0.8)}
.modal-header{padding:20px;background:rgba(59, 7, 100, 0.4);border-bottom:1px solid rgba(212,175,55,0.2);display:flex;justify-content:space-between;align-items:center}
.modal-body{flex:1;padding:30px;overflow-y:auto}

/* Notifications */
.notify{position:fixed;top:20px;right:20px;z-index:11000;min-width:280px;padding:16px;border-radius:10px;font-family:'Cinzel',serif;font-size:12px;display:flex;align-items:center;gap:12px;box-shadow:0 10px 30px rgba(0,0,0,0.5);animation:fadeUp 0.3s ease}

.progress-bar{height:4px;background:rgba(212,175,55,0.1);border-radius:4px;overflow:hidden;margin:10px 0}
.progress-fill{height:100%;background:linear-gradient(90deg,#C9A020,#E8CC6A);transition:width 0.3s}

.upload-zone{border:2px dashed rgba(212,175,55,.3);border-radius:12px;padding:40px;text-align:center;cursor:pointer;background:rgba(212,175,55,.02);transition:all 0.3s}
.upload-zone:hover{background:rgba(212,175,55,0.05);border-color:#D4AF37}

/* Confirm Box */
.confirm-box{background:#1a0535;border:1px solid rgba(212,175,55,0.3);border-radius:14px;padding:32px;width:380px;text-align:center}

<body>

<div id="loadingScreen" style="position:fixed;inset:0;background:#0f0a1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px">
  <div class="spinner-sm" style="width:40px;height:40px;border-width:4px"></div>
  <p class="cinzel" style="font-size:14px;color:#C9A020;letter-spacing:4px">LIBAS SYSTEM LOADING...</p>
</div>

<div id="orderModal" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="cinzel" style="color:#E8CC6A;margin:0;font-size:16px">Order Details & Items</h3>
            <button onclick="closeModal()" style="background:none;border:none;color:#f87171;font-size:28px;cursor:pointer">&times;</button>
        </div>
        <div id="modalBody" class="modal-body"></div>
    </div>
</div>

<div id="confirmModal" class="modal-overlay">
    <div class="confirm-box">
        <div id="confirmIcon" style="font-size:40px;margin-bottom:15px">⚠️</div>
        <h3 class="cinzel" id="confirmTitle" style="color:#E8CC6A;margin-bottom:10px">Are you sure?</h3>
        <p id="confirmMsg" style="font-size:13px;opacity:0.7;margin-bottom:25px"></p>
        <div style="display:flex;gap:12px">
            <button onclick="closeConfirm()" style="flex:1;padding:12px;background:rgba(255,255,255,0.05);border:none;color:white;border-radius:8px;cursor:pointer">Cancel</button>
            <button id="confirmOkBtn" style="flex:1;padding:12px;background:rgba(220,38,38,0.2);border:1px solid #f87171;color:#f87171;border-radius:8px;cursor:pointer;font-weight:700">Confirm</button>
        </div>
    </div>
</div>

<div id="adminApp" style="display:none">
  <div class="sidebar">
    <div style="padding:0 20px 20px;border-bottom:1px solid rgba(212,175,55,.1);margin-bottom:20px">
      <h1 class="cinzel" style="font-size:22px;font-weight:700"><span class="gold-text">Libas</span></h1>
      <p class="cinzel" style="font-size:8px;letter-spacing:3px;opacity:0.5">Admin Management</p>
    </div>
    <button class="sidebar-btn active" id="navDashboard" onclick="showTab('dashboard')">📊 Dashboardd</button>
    <button class="sidebar-btn" id="navProducts" onclick="showTab('products')">🧵 All Products</button>
    <button class="sidebar-btn" id="navAdd" onclick="showTab('add')">➕ Add Product</button>
    <button class="sidebar-btn" id="navBanners" onclick="showTab('banners')">🖼️ Banner Images</button>
    <button class="sidebar-btn" id="navOrders" onclick="showTab('orders')">📦 Order Details <span id="newOrdersBadge" style="display:none;margin-left:auto;background:#7C3AED;color:white;padding:2px 6px;border-radius:10px;font-size:10px"></span></button>
    <button class="sidebar-btn" id="navThaanpwd" onclick="showTab('thaanpwd')">🔑 Wholesale Password</button>
    <button class="sidebar-btn" id="navSetup" onclick="showTab('setup')">⚙️ DB Setup</button>
  </div>

  <div class="main-content">
    <div id="tabContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// --- SUPABASE CONFIG ---
const SUPABASE_URL  = 'https://pkxdhwvfnnzmjxjtostm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBreGRod3Zmbm56bWp4anRvc3RtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTA5MTcsImV4cCI6MjA4NzY2NjkxN30.nKk0BVTHCVPhVGpBdL5RPCHl67DyQiBRZVclnjtGtvo';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// --- GLOBAL STATE ---
const CATEGORIES = ['Shirting', 'Suiting', 'Thaan'];
const SUBCATS = { Shirting: ['Linen','Cotton','Cotton Linen','Khadi','Polister'], Suiting: ['Linen','Cotton','Raymond','Mafatlal','Donear'], Thaan: ['Linen','Cotton','Suiting Thaan','Shirting Thaan'] };
const ALL_SIZES = ['1.20m','1.30m','1.60m','1.80m','2.00m','2.15m','2.25m','2.30m'];
const STORAGE_BUCKET = 'product_images';

let products = [], banners = [], orders = [];
let editingId = null;
let selectedSizes = [];
let _ordersFilter = '', _ordersPayFilter = '';
let _prodImgUrls = [];

// --- INITIALIZE ---
async function init() {
  await Promise.all([loadProducts(), loadBanners(), loadOrders()]);
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  showTab('dashboard');
}

async function loadProducts() {
  const { data } = await sb.from('products').select('*').order('created_at', { ascending: false });
  products = data || [];
}
async function loadBanners() {
  const { data } = await sb.from('banner_images').select('*').order('sort_order', { ascending: true });
  banners = data || [];
}
async function loadOrders() {
  const { data } = await sb.from('orders').select('*').order('created_at', { ascending: false });
  orders = data || [];
  const badge = document.getElementById('newOrdersBadge');
  const count = orders.filter(o => o.order_status === 'New').length;
  if(badge) { badge.textContent = count; badge.style.display = count > 0 ? 'inline' : 'none'; }
}

// --- TABS ---
function showTab(tab) {
  const allTabs = ['dashboard','products','add','banners','setup','orders','thaanpwd'];
  allTabs.forEach(t => {
    const el = document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1));
    if(el) el.classList.toggle('active', t === tab);
  });
  
  if(tab === 'dashboard') renderDashboard();
  else if(tab === 'products') renderProducts();
  else if(tab === 'add') { editingId = null; selectedSizes = []; _prodImgUrls = []; renderForm(); }
  else if(tab === 'banners') renderBanners();
  else if(tab === 'orders') renderOrders();
  else if(tab === 'thaanpwd') renderThaanPwd();
  else if(tab === 'setup') renderSetup();
}

// --- DASHBOARD ---
function renderDashboard() {
  const shirtingCount = products.filter(p => p.category === 'Shirting').length;
  const suitingCount = products.filter(p => p.category === 'Suiting').length;
  const newArrivals = products.filter(p => p.is_new).length;
  const revenue = orders.filter(o => o.payment_status === 'Paid').reduce((s,o) => s + Number(o.total_amount||0), 0);
  const split = products.length ? Math.round((shirtingCount/products.length)*100) : 0;

  document.getElementById('tabContent').innerHTML = `
    <h2 class="cinzel" style="margin-bottom:25px"><span class="gold-text">📊 Dashboard</span></h2>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:25px">
        <div class="stat-card"><div class="stat-icon" style="background:#7c3aed22">🧵</div><div><div class="cinzel" style="font-size:22px">${products.length}</div><div style="font-size:11px;opacity:0.5">Total Products</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#2563eb22">👔</div><div><div class="cinzel" style="font-size:22px">${shirtingCount}</div><div style="font-size:11px;opacity:0.5">Shirting</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#05966922">🎩</div><div><div class="cinzel" style="font-size:22px">${suitingCount}</div><div style="font-size:11px;opacity:0.5">Suiting</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#d9770622">⭐</div><div><div class="cinzel" style="font-size:22px">${newArrivals}</div><div style="font-size:11px;opacity:0.5">New Arrivals</div></div></div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:25px">
        <div class="stat-card" style="cursor:pointer" onclick="showTab('orders')"><div class="stat-icon">📦</div><div><div class="cinzel" style="font-size:22px">${orders.length}</div><div style="font-size:11px;opacity:0.5">Total Orders</div></div></div>
        <div class="stat-card" style="cursor:pointer; ${orders.filter(o=>o.order_status==='New').length > 0 ? 'border-color:#7C3AED' : ''}" onclick="showTab('orders')"><div class="stat-icon" style="background:#7c3aed22">🆕</div><div><div class="cinzel" style="font-size:22px; ${orders.filter(o=>o.order_status==='New').length > 0 ? 'color:#a78bfa' : ''}">${orders.filter(o=>o.order_status==='New').length}</div><div style="font-size:11px;opacity:0.5">New Orders</div></div></div>
        <div class="stat-card"><div class="stat-icon" style="background:#C9A02022">₹</div><div><div class="cinzel" style="font-size:20px;color:#C9A020">₹${revenue.toFixed(0)}</div><div style="font-size:11px;opacity:0.5">Paid Revenue</div></div></div>
    </div>

    <div style="display:grid;grid-template-columns: 2fr 1fr; gap:20px">
        <div class="card">
            <h3 class="cinzel" style="font-size:14px;color:#E8CC6A;margin-bottom:20px">RECENT PRODUCTS</h3>
            ${products.slice(0,5).map(p => `
                <div style="display:flex;align-items:center;gap:12px;padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;margin-bottom:8px">
                    <img src="${p.image_url}" style="width:40px;height:40px;object-fit:cover;border-radius:6px">
                    <div style="flex:1"><p style="font-size:13px;font-weight:600">${p.name}</p><small style="opacity:0.5">${p.category} · ${p.brand}</small></div>
                    <span class="cinzel" style="color:#C9A020;font-weight:700">₹${p.price}</span>
                    ${p.is_new ? '<span style="background:#D4AF37;color:black;font-size:8px;padding:2px 5px;border-radius:2px;font-weight:700">NEW</span>' : ''}
                </div>
            `).join('')}
            ${products.length > 5 ? `<button class="btn-outline" style="width:100%;margin-top:10px" onclick="showTab('products')">View All Products →</button>` : ''}
        </div>
        <div class="card">
            <h3 class="cinzel" style="font-size:14px;color:#E8CC6A;margin-bottom:20px">QUICK ACTIONS</h3>
            <div style="display:flex;flex-direction:column;gap:10px">

function calcPreviews(val) {

    grid.innerHTML = ALL_SIZES.map(s => {

        return `<div style="background:rgba(212,175,55,0.05);padding:10px;border-radius:8px;text-align:center;border:1px solid rgba(212,175,55,0.2)">

async function uploadFiles(files) {
    const info = document.getElementById('upInfo');
    const prog = document.getElementById('upProg');
    const fill = document.getElementById('upFill');
    info.style.display = 'none'; prog.style.display = 'block';
    
    for(let i=0; i<files.length; i++) {
        const f = files[i];
        const path = `products/${Date.now()}_${f.name}`;
        await sb.storage.from(STORAGE_BUCKET).upload(path, f);
        const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
        _prodImgUrls.push(data.publicUrl);
        fill.style.width = `${((i+1)/files.length)*100}%`;
    }
    prog.style.display = 'none'; info.style.display = 'block';
    renderImgPreviews();
}

function renderImgPreviews() {
    const div = document.getElementById('imgPreviews');

// --- CRUD & LOGIC ---

async function saveProduct() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span> Saving...';
    
    const payload = {
        name: document.getElementById('fName').value,
        category: document.getElementById('fCat').value,
        subcategory: document.getElementById('fSub').value,
        brand: document.getElementById('fBrand').value,
        price: parseFloat(document.getElementById('fPrice').value),
        stock: parseInt(document.getElementById('fStock').value),
        description: document.getElementById('fDesc').value,
        is_new: document.getElementById('fNew').checked,
        image_url: _prodImgUrls[0] || '',
        image_urls: _prodImgUrls,
        sizes: selectedSizes
    };

    try {
        if(!editingId) {
            const { data: last } = await sb.from('products').select('product_no').order('created_at',{ascending:false}).limit(1);
            const next = last?.[0] ? parseInt(last[0].product_no.split('-')[1]) + 1 : 1;
            payload.product_no = 'LIB-' + String(next).padStart(4,'0');
            await sb.from('products').insert([payload]);
        } else {
            await sb.from('products').update(payload).eq('id', editingId);
        }
        notify("Success", "success"); showTab('products'); loadProducts();
    } catch(e) { notify(e.message, "error"); }
    finally { btn.disabled = false; btn.textContent = 'Save Product'; }
}

async function updateOrderStatus(id, val) {
    await sb.from('orders').update({ order_status: val }).eq('id', id);
    notify("Status updated", "success");
    loadOrders();
}

async function updatePwd() {
    const n = document.getElementById('nP').value;
    const c = document.getElementById('cP').value;
    if(n.length < 4) return notify("Min 4 characters", "error");
    if(n !== c) return notify("Passwords mismatch", "error");
    
    await sb.from('app_settings').upsert({ key:'thaan_password', value:n }, { onConflict:'key' });
    notify("Password updated", "success");
    renderThaanPwd();
}

// --- UTILS ---
function notify(m, t) {
    const n = document.createElement('div');
    n.className = 'notify';
    n.style.background = t === 'success' ? '#14532d' : '#450a0a';
    n.style.borderColor = t === 'success' ? '#22c55e' : '#f87171';
    n.innerHTML = `<span>${t==='success'?'✅':'❌'}</span>${m}`;
    document.body.appendChild(n);
    setTimeout(() => n.remove(), 3000);
}
function payColor(status) {
    switch(status) {
        case 'Paid': return '#22c55e';    // Green
        case 'Pending': return '#fbbf24'; // Yellow
        case 'Failed': return '#f87171';  // Red
        default: return '#e2e8f0';        // Default white/gray
    }
}   

function showConfirm({title, msg, onOk}) {
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    const btn = document.getElementById('confirmOkBtn');
    btn.onclick = () => { closeConfirm(); onOk(); };
    document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm() { document.getElementById('confirmModal').classList.remove('open'); }
function closeModal() { document.getElementById('orderModal').classList.remove('open'); }
function toggleSize(btn, s) { btn.classList.toggle('selected'); if(selectedSizes.includes(s)) selectedSizes = selectedSizes.filter(x=>x!==s); else selectedSizes.push(s); }
function togglePwdVisibility() { const el = document.getElementById('currP'); el.type = el.type === 'password' ? 'text' : 'password'; el.style.filter = el.type === 'text' ? 'none' : 'blur(6px)'; }
function startEdit(id) { editingId = id; const p = products.find(x=>x.id==id); selectedSizes = p.sizes || []; _prodImgUrls = p.image_urls || []; renderForm(); }
function confirmDeleteProduct(id) { showConfirm({ title:'Delete Product?', msg:'This action cannot be undone.', onOk: async () => { await sb.from('products').delete().eq('id', id); notify("Deleted","success"); await loadProducts(); renderProducts(); } }); }
function confirmDeleteOrder(id) { showConfirm({ title:'Delete Order?', msg:'Permanent removal from database.', onOk: async () => { await sb.from('orders').delete().eq('id', id); notify("Deleted","success"); await loadOrders(); renderOrders(); } }); }

// --- LEGACY PLACEHOLDERS ---
function renderSetup() { document.getElementById('tabContent').innerHTML = '<div class="card"><h3>Database Setup</h3><p>Ensure tables products, orders, banner_images, and app_settings exist in Supabase.</p></div>'; }
async function uploadBannerFile(f) { const path = `banners/${Date.now()}_${f.name}`; await sb.storage.from(STORAGE_BUCKET).upload(path, f); const { data } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(path); window._bUrl = data.publicUrl; document.getElementById('bPreview').innerHTML = `<img src="${window._bUrl}" style="height:50px;margin-top:10px">`; }
async function saveBanner() { await sb.from('banner_images').insert([{ title: document.getElementById('bTitle').value, subtitle: document.getElementById('bSub').value, sort_order: parseInt(document.getElementById('bOrder').value), image_url: window._bUrl, is_active: true }]); loadBanners(); renderBanners(); }
async function toggleBanner(id, curr) { await sb.from('banner_images').update({ is_active: !curr }).eq('id', id); loadBanners(); renderBanners(); }
async function confirmDeleteBanner(id) { await sb.from('banner_images').delete().eq('id', id); loadBanners(); renderBanners(); }

init();
</script>
