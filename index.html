<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Libas Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0} 
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:#0f0a1e;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#1a1030}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:3px}
.cinzel{font-family:'Cinzel',serif}

@keyframes shimmer{0%{background-position:-400% center}100%{background-position:400% center}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.gold-text{background:linear-gradient(90deg,#C9A020,#E8CC6A,#C9A020);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}

.spinner{width:28px;height:28px;border:3px solid rgba(212,175,55,.2);border-top-color:#D4AF37;border-radius:50%;animation:spin .8s linear infinite}
.spinner-sm{width:18px;height:18px;border:2px solid rgba(212,175,55,.2);border-top-color:#D4AF37;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}

.btn-gold{background:linear-gradient(135deg,#C9A020,#E8CC6A,#C9A020);background-size:200% auto;color:#180626;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1.5px;border:none;cursor:pointer;transition:all .3s;font-size:12px}
.btn-gold:hover{background-position:right center;box-shadow:0 6px 24px rgba(212,175,55,.4);transform:translateY(-1px)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-danger{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;transition:all .2s;padding:6px 12px;border-radius:6px}
.btn-danger:hover{background:rgba(220,38,38,.3)}

.btn-outline{background:transparent;color:#D4AF37;font-family:'Cinzel',serif;font-weight:600;letter-spacing:1px;border:1px solid rgba(212,175,55,.5);cursor:pointer;transition:all .3s;font-size:12px}
.btn-outline:hover{background:rgba(212,175,55,.1)}

.input-field{width:100%;padding:10px 14px;border:1px solid rgba(212,175,55,.2);border-radius:8px;background:rgba(255,255,255,.05);font-family:'Lato',sans-serif;font-size:14px;color:#e2e8f0;outline:none;transition:border-color .2s}
.input-field:focus{border-color:#7C3AED;background:rgba(255,255,255,.08)}
.input-field::placeholder{color:rgba(255,255,255,.3)}
textarea.input-field{resize:vertical}

.select-field{width:100%;padding:10px 14px;border:1px solid rgba(212,175,55,.2);border-radius:8px;background:rgba(15,10,30,.9);font-family:'Lato',sans-serif;font-size:14px;color:#e2e8f0;outline:none;cursor:pointer}
.select-field:focus{border-color:#7C3AED}

.card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:24px}

.label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#C9A020;display:block;margin-bottom:6px;text-transform:uppercase}

.notify{position:fixed;top:20px;right:20px;z-index:9999;min-width:260px;padding:14px 18px;border-radius:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid;animation:fadeUp .3s ease;display:flex;align-items:center;gap:10px}

.progress-bar{height:3px;background:rgba(212,175,55,.2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#C9A020,#E8CC6A);border-radius:3px;transition:width .3s}

/* Upload drop zone */
.upload-zone{border:2px dashed rgba(212,175,55,.3);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(212,175,55,.03)}
.upload-zone:hover,.upload-zone.dragover{border-color:#D4AF37;background:rgba(212,175,55,.08)}

/* Banner card */
.banner-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.15);border-radius:10px;overflow:hidden;transition:all .2s}
.banner-card:hover{border-color:rgba(212,175,55,.4)}

/* Portfolio item card */
.pitem-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.12);border-radius:12px;overflow:hidden;transition:all .2s}
.pitem-card:hover{border-color:rgba(212,175,55,.35)}

/* Portfolio item image slider */
.pitem-slider{position:relative;overflow:hidden;height:180px}
.pitem-track{display:flex;height:100%;transition:transform .35s}
.pitem-slide{min-width:100%;height:100%;flex-shrink:0}
.pitem-slide img{width:100%;height:100%;object-fit:cover;display:block}
.pitem-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.5);border:1px solid rgba(212,175,55,.4);color:#E8CC6A;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:5}
.pitem-dots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:5}
.pitem-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.4);border:none;cursor:pointer;padding:0;transition:all .2s}
.pitem-dot.active{background:#D4AF37;width:16px;border-radius:3px}

.sidebar{width:220px;background:rgba(255,255,255,.03);border-right:1px solid rgba(212,175,55,.1);min-height:100vh;position:fixed;left:0;top:0;padding-top:80px;z-index:10}
.sidebar-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 20px;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;transition:all .2s;border-left:2px solid transparent;text-align:left}
.sidebar-btn:hover{background:rgba(212,175,55,.06);color:#E8CC6A;border-left-color:rgba(212,175,55,.4)}
.sidebar-btn.active{background:rgba(124,58,237,.15);color:#E8CC6A;border-left-color:#D4AF37}

.category-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1.5px;font-weight:700}

@media(max-width:768px){
  .sidebar{display:none!important}
  .main-content{margin-left:0!important;padding:16px!important}
  #mobileAdminNav{display:block!important}
  .form-grid{grid-template-columns:1fr!important}
  .pitem-grid{grid-template-columns:1fr!important}
  .banner-grid{grid-template-columns:1fr!important}
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen" style="position:fixed;inset:0;background:#0f0a1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px">
  <div class="spinner"></div>
  <p class="cinzel" style="font-size:13px;color:#C9A020;letter-spacing:3px">LIBAS ADMIN</p>
</div>

<!-- MAIN ADMIN APP -->
<div id="adminApp" style="display:none">

  <!-- Sidebar (desktop) -->
  <div class="sidebar">
    <div style="padding:20px;border-bottom:1px solid rgba(212,175,55,.1);position:fixed;top:0;left:0;width:220px;background:#0f0a1e;z-index:11">
      <h1 class="cinzel" style="font-size:20px;font-weight:700"><span class="gold-text">Libas</span></h1>
      <p class="cinzel" style="font-size:7px;letter-spacing:4px;color:#E8CC6A;opacity:.6;margin-top:2px">ADMIN PANEL</p>
    </div>
    <button class="sidebar-btn active" id="navBanners" onclick="showTab('banners')">🖼️ Banner Images</button>
    <button class="sidebar-btn" id="navPortfolio" onclick="showTab('portfolio')">📁 Portfolio Content</button>
  </div>

  <!-- Mobile Top Nav (visible only on mobile) -->
  <div style="display:none;position:sticky;top:0;z-index:200;background:#0f0a1e;border-bottom:1px solid rgba(212,175,55,.2);padding:0" id="mobileAdminNav">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(212,175,55,.15)">
      <div>
        <span class="cinzel" style="font-size:18px;font-weight:700"><span class="gold-text">Libas</span></span>
        <span class="cinzel" style="font-size:7px;letter-spacing:3px;color:#E8CC6A;opacity:.6;margin-left:6px">ADMIN</span>
      </div>
    </div>
    <div style="display:flex;border-bottom:2px solid rgba(212,175,55,.15)">
      <button id="mnavBanners" onclick="showTab('banners')" style="flex:1;padding:14px 8px;background:rgba(124,58,237,.15);border:none;border-bottom:2px solid #D4AF37;color:#E8CC6A;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-bottom:-2px">🖼️ Banners</button>
      <button id="mnavPortfolio" onclick="showTab('portfolio')" style="flex:1;padding:14px 8px;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.5);font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-bottom:-2px">📁 Portfolio Content</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="main-content" style="margin-left:220px;padding:30px;min-height:100vh">
    <div id="tabContent"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── SUPABASE CONFIG ──
const SUPABASE_URL  = 'https://hkdenuzxxrcvcgtbqgxq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhrZGVudXp4eHJjdmNndGJxZ3hxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NTM5MjIsImV4cCI6MjA4NzMyOTkyMn0.2GgEChu1H-1vyKorxjDm_p4VHP7YOuSpFMo_wF8f6vY';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const STORAGE_BUCKET = 'product_images';
const PORTFOLIO_CATEGORIES = [
  { key: 'about',        label: 'About Us',         color: '#7C3AED' },
  { key: 'specialities', label: 'Our Specialities',  color: '#C9A020' },
  { key: 'achievements', label: 'Our Achievements',  color: '#16A34A' },
  { key: 'goals',        label: 'Our Future Goals',  color: '#2563EB' },
];

// ── STATE ──
let banners = [];
let portfolioItems = [];
let pendingBannerUrls = [];
let pendingPortfolioUrls = [];
const pitemSlideIdx = {};
let bannerTableOk = true;
let portfolioTableOk = true;

// ── INIT ──
async function init() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  await Promise.all([loadBanners(), loadPortfolioItems()]);
  showTab('banners');
}

// ── DATA LOADERS ──
async function loadBanners() {
  try {
    const { data, error } = await sb.from('banner_images').select('*').order('sort_order', { ascending: true });
    if (error) { bannerTableOk = false; banners = []; return; }
    bannerTableOk = true;
    banners = data || [];
  } catch(e) { bannerTableOk = false; banners = []; }
}

async function loadPortfolioItems() {
  try {
    const { data, error } = await sb.from('portfolio_items').select('*').order('created_at', { ascending: false });
    if (error) { portfolioTableOk = false; portfolioItems = []; return; }
    portfolioTableOk = true;
    portfolioItems = data || [];
  } catch(e) { portfolioTableOk = false; portfolioItems = []; }
}

// ── TABS ──
function showTab(tab) {
  // Desktop sidebar
  document.getElementById('navBanners').classList.toggle('active', tab === 'banners');
  document.getElementById('navPortfolio').classList.toggle('active', tab === 'portfolio');

  // Mobile top nav
  const mb = document.getElementById('mnavBanners');
  const mp = document.getElementById('mnavPortfolio');
  if (mb && mp) {
    const activeStyle = 'flex:1;padding:14px 8px;background:rgba(124,58,237,.15);border:none;border-bottom:2px solid #D4AF37;color:#E8CC6A;font-family:\'Cinzel\',serif;font-size:11px;letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-bottom:-2px';
    const idleStyle   = 'flex:1;padding:14px 8px;background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.5);font-family:\'Cinzel\',serif;font-size:11px;letter-spacing:.5px;cursor:pointer;transition:all .2s;margin-bottom:-2px';
    mb.style.cssText = tab === 'banners'   ? activeStyle : idleStyle;
    mp.style.cssText = tab === 'portfolio' ? activeStyle : idleStyle;
  }

  if (tab === 'banners') renderBannersTab();
  else if (tab === 'portfolio') renderPortfolioTab();
}

// ════════════════════════════════════════
// ── BANNER IMAGES TAB ──
// ════════════════════════════════════════
function renderBannersTab() {
  const dbAlert = !bannerTableOk ? `
  <div style="background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.4);border-radius:10px;padding:16px 20px;margin-bottom:24px;display:flex;gap:12px;align-items:flex-start">
    <span style="font-size:20px;flex-shrink:0">⚠️</span>
    <div>
      <p class="cinzel" style="font-size:12px;color:#f87171;letter-spacing:1px;margin-bottom:6px">BANNER TABLE ERROR — RUN THIS SQL IN SUPABASE</p>
      <div style="background:rgba(0,0,0,.4);border-radius:6px;padding:10px 14px;font-family:monospace;font-size:12px;color:#a5f3fc;line-height:1.8;position:relative;margin-bottom:8px">
        <button onclick="navigator.clipboard.writeText(document.getElementById('sqlBannerFix').textContent).then(()=>notify('Copied!','success'))" style="position:absolute;top:6px;right:8px;background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#E8CC6A;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif">COPY</button>
        <pre id="sqlBannerFix" style="white-space:pre-wrap;margin:0">ALTER TABLE banner_images DISABLE ROW LEVEL SECURITY;

-- If table doesn't exist yet:
CREATE TABLE IF NOT EXISTS banner_images (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  image_url text NOT NULL,
  title text,
  subtitle text,
  sort_order integer DEFAULT 0,
  is_active boolean DEFAULT true,
  created_at timestamptz DEFAULT now()
);
ALTER TABLE banner_images DISABLE ROW LEVEL SECURITY;</pre>
      </div>
      <button onclick="loadBanners().then(renderBannersTab)" class="btn-outline" style="padding:7px 16px;border-radius:6px;font-size:11px">↺ Retry</button>
    </div>
  </div>` : '';
  document.getElementById('tabContent').innerHTML = `
  ${dbAlert}
  <div style="margin-bottom:28px">
    <h2 class="cinzel" style="font-size:24px;font-weight:700;margin-bottom:4px"><span class="gold-text">Banner Images</span></h2>
    <p style="color:rgba(255,255,255,.4);font-size:13px">Upload and manage the homepage banner slider images</p>
  </div>

  <!-- Upload Form -->
  <div class="card" style="margin-bottom:24px">
    <h3 class="cinzel" style="font-size:13px;color:#E8CC6A;margin-bottom:20px;letter-spacing:1px">ADD NEW BANNERS</h3>
    <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div>
        <label class="label">Title (optional)</label>
        <input class="input-field" id="bTitle" type="text" placeholder="e.g. Premium Collection 2025"/>
      </div>
      <div>
        <label class="label">Subtitle (optional)</label>
        <input class="input-field" id="bSubtitle" type="text" placeholder="e.g. Premium fabrics at best prices"/>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <label class="label">Sort Order <span style="color:rgba(255,255,255,.3);font-size:9px">(lower = shown first)</span></label>
      <input class="input-field" id="bOrder" type="number" min="0" value="${banners.length}" style="max-width:120px"/>
    </div>

    <label class="label">Banner Image(s) * <span style="color:rgba(255,255,255,.3);font-size:9px">(select multiple — each becomes a separate banner slide)</span></label>
    <div class="upload-zone" id="bannerUploadZone" onclick="document.getElementById('bannerImgFile').click()"
         ondragover="event.preventDefault();this.classList.add('dragover')"
         ondragleave="this.classList.remove('dragover')"
         ondrop="handleBannerDrop(event)">
      <div id="bannerPreviewWrap">
        <div style="font-size:48px;margin-bottom:10px">🖼️</div>
        <p class="cinzel" style="font-size:12px;color:#C9A020;letter-spacing:1px;margin-bottom:4px">CLICK OR DRAG TO UPLOAD BANNER IMAGES</p>
        <p style="font-size:12px;color:rgba(255,255,255,.3)">Select multiple photos · Recommended: 1200×420px · JPG, PNG, WEBP · Max 10MB each</p>
      </div>
      <div id="bannerUploadProgress" style="display:none;margin-top:12px">
        <div class="progress-bar"><div class="progress-fill" id="bannerProgressFill" style="width:0%"></div></div>
        <p style="font-size:11px;color:#C9A020;margin-top:6px" id="bannerUploadStatus">Uploading...</p>
      </div>
    </div>
    <input type="file" id="bannerImgFile" accept="image/*" multiple style="display:none" onchange="handleBannerFileSelect(this)"/>

    <button class="btn-gold" id="addBannerBtn" onclick="addBanners()" style="padding:12px 32px;border-radius:8px;font-size:12px;margin-top:16px">✅ Save Banners</button>
  </div>

  <!-- Current Banners -->
  <div class="card">
    <h3 class="cinzel" style="font-size:14px;color:#E8CC6A;margin-bottom:20px;letter-spacing:1px">CURRENT BANNERS (${banners.length})</h3>
    <div id="bannerList" class="banner-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
      ${banners.length === 0
        ? '<p style="color:rgba(255,255,255,.3);text-align:center;padding:40px;grid-column:1/-1">No banners yet. Upload your first one above.</p>'
        : banners.map(b => bannerCardHTML(b)).join('')}
    </div>
  </div>`;
}

function bannerCardHTML(b) {
  const isActive = b.is_active;
  return '<div class="banner-card" id="bcard-' + b.id + '">'
    + '<div style="width:100%;height:180px;background:rgba(59,7,100,.5);position:relative;overflow:hidden">'
    + (b.image_url
        ? '<img src="' + b.image_url + '" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.parentElement.style.background=\'rgba(59,7,100,.8)\'">'
        : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px"><span style="font-size:40px">🖼️</span></div>')
    + '<span style="position:absolute;top:10px;left:10px;font-size:9px;padding:4px 10px;border-radius:20px;background:' + (isActive ? 'rgba(22,163,74,.9)' : 'rgba(107,114,128,.7)') + ';color:#fff;font-family:Cinzel,serif;letter-spacing:1.5px;font-weight:700">' + (isActive ? '● LIVE' : '● HIDDEN') + '</span>'
    + '<span style="position:absolute;top:10px;right:10px;font-size:9px;padding:4px 10px;border-radius:20px;background:rgba(0,0,0,.5);color:rgba(212,175,55,.8);font-family:Cinzel,serif">Order: ' + (b.sort_order || 0) + '</span>'
    + '</div>'
    + '<div style="padding:12px 14px">'
    + '<p style="font-weight:600;font-size:13px;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (b.title || '<span style="color:rgba(255,255,255,.3)">No title set</span>') + '</p>'
    + (b.subtitle ? '<p style="font-size:11px;color:rgba(212,175,55,.6);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + b.subtitle + '</p>' : '<div style="margin-bottom:10px"></div>')
    + '<div style="display:flex;gap:8px">'
    + '<button onclick="toggleBannerActive(\'' + b.id + '\',' + isActive + ')" style="flex:1;padding:7px 10px;border-radius:6px;font-size:11px;font-family:Cinzel,serif;cursor:pointer;border:1px solid rgba(212,175,55,.4);background:rgba(212,175,55,.1);color:#E8CC6A;letter-spacing:.5px">' + (isActive ? '👁 Hide' : '✅ Show') + '</button>'
    + '<button onclick="delBanner(\'' + b.id + '\')" style="flex:1;padding:7px 10px;border-radius:6px;font-size:11px;font-family:Cinzel,serif;cursor:pointer;border:1px solid rgba(220,38,38,.5);background:rgba(127,29,29,.4);color:#fca5a5;letter-spacing:.5px">🗑 Delete</button>'
    + '</div></div></div>';
}

async function handleBannerFileSelect(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  await uploadBannerFiles(files);
}
function handleBannerDrop(e) {
  e.preventDefault();
  document.getElementById('bannerUploadZone').classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) { notify('Please drop image files.', 'error'); return; }
  uploadBannerFiles(files);
}
async function uploadBannerFiles(files) {
  const prog = document.getElementById('bannerUploadProgress');
  const fill = document.getElementById('bannerProgressFill');
  const status = document.getElementById('bannerUploadStatus');
  const prevWrap = document.getElementById('bannerPreviewWrap');
  prog.style.display = 'block'; prevWrap.style.opacity = '0.4';
  pendingBannerUrls = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (file.size > 10 * 1024 * 1024) { notify(`${file.name} too large (max 10MB), skipped.`, 'error'); continue; }
    fill.style.width = Math.round(((i + 0.5) / files.length) * 100) + '%';
    status.textContent = `Uploading ${i + 1} of ${files.length}: ${file.name}`;
    const ext = file.name.split('.').pop().toLowerCase();
    const fileName = `banners/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(fileName, file, { cacheControl: '3600', upsert: true });
    if (error) { notify(`Failed: ${file.name} — ${error.message}`, 'error'); continue; }
    const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
    pendingBannerUrls.push(urlData.publicUrl);
  }
  fill.style.width = '100%';
  status.textContent = `✅ ${pendingBannerUrls.length} of ${files.length} uploaded!`;
  prevWrap.style.opacity = '1';
  if (pendingBannerUrls.length > 0) {
    prevWrap.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px">
      ${pendingBannerUrls.map(url => `<img src="${url}" style="height:80px;width:140px;object-fit:cover;border-radius:6px;border:1px solid rgba(212,175,55,.4)"/>`).join('')}
    </div><p style="color:#4ade80;font-size:12px">${pendingBannerUrls.length} image(s) ready — click Save Banners below</p>`;
    notify(`✅ ${pendingBannerUrls.length} banner image(s) uploaded!`, 'success');
  }
  setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 2000);
}
async function addBanners() {
  if (!pendingBannerUrls.length) { notify('Please upload at least one image first.', 'error'); return; }
  const btn = document.getElementById('addBannerBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span> Saving...';
  const title    = (document.getElementById('bTitle').value || '').trim() || null;
  const subtitle = (document.getElementById('bSubtitle').value || '').trim() || null;
  const baseOrder = parseInt(document.getElementById('bOrder').value || '0') || 0;
  const rows = pendingBannerUrls.map((url, idx) => ({ image_url: url, title, subtitle, sort_order: baseOrder + idx, is_active: true }));
  const { error } = await sb.from('banner_images').insert(rows);
  if (error) { notify('Error saving banners: ' + error.message, 'error'); btn.disabled = false; btn.textContent = '✅ Save Banners'; return; }
  notify(`✅ ${rows.length} banner(s) added!`, 'success');
  pendingBannerUrls = [];
  await loadBanners();
  renderBannersTab();
}
async function toggleBannerActive(id, current) {
  const { error } = await sb.from('banner_images').update({ is_active: !current }).eq('id', id);
  if (error) { notify('Error: ' + error.message, 'error'); return; }
  await loadBanners();
  const list = document.getElementById('bannerList');
  if (list) list.innerHTML = banners.length === 0 ? '<p style="color:rgba(255,255,255,.3);text-align:center;padding:40px;grid-column:1/-1">No banners yet.</p>' : banners.map(b => bannerCardHTML(b)).join('');
  notify(`Banner ${!current ? 'shown' : 'hidden'} on website.`, 'success');
}
async function delBanner(id) {
  if (!confirm('Delete this banner? This cannot be undone.')) return;
  const { error } = await sb.from('banner_images').delete().eq('id', id);
  if (error) { notify('Error: ' + error.message, 'error'); return; }
  notify('🗑 Banner deleted.', 'info');
  await loadBanners();
  const list = document.getElementById('bannerList');
  if (list) list.innerHTML = banners.length === 0 ? '<p style="color:rgba(255,255,255,.3);text-align:center;padding:40px;grid-column:1/-1">No banners yet.</p>' : banners.map(b => bannerCardHTML(b)).join('');
}

// ════════════════════════════════════════
// ── PORTFOLIO CONTENT TAB ──
// ════════════════════════════════════════
function renderPortfolioTab() {
  const catOptions = PORTFOLIO_CATEGORIES.map(c => `<option value="${c.key}">${c.label}</option>`).join('');
  const totalItems = portfolioItems.length;

  // Show prominent alert if portfolio table is missing
  const dbAlert = !portfolioTableOk ? `
  <div style="background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.4);border-radius:10px;padding:16px 20px;margin-bottom:24px">
    <div style="display:flex;gap:12px;align-items:flex-start;margin-bottom:12px">
      <span style="font-size:20px;flex-shrink:0">⚠️</span>
      <div>
        <p class="cinzel" style="font-size:12px;color:#f87171;letter-spacing:1px;margin-bottom:4px">PORTFOLIO TABLE NOT FOUND</p>
        <p style="font-size:12px;color:rgba(255,255,255,.5);line-height:1.6">Run this SQL once in <b style="color:#C9A020">Supabase → SQL Editor</b>, then click Retry:</p>
      </div>
    </div>
    <div style="background:rgba(0,0,0,.4);border-radius:6px;padding:12px 14px;font-family:monospace;font-size:12px;color:#a5f3fc;line-height:1.8;position:relative;margin-bottom:12px">
      <button onclick="navigator.clipboard.writeText(document.getElementById('sqlPortfolioFix').textContent).then(()=>notify('SQL copied!','success'))" style="position:absolute;top:6px;right:8px;background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#E8CC6A;padding:3px 8px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif">COPY</button>
      <pre id="sqlPortfolioFix" style="white-space:pre-wrap;margin:0">CREATE TABLE IF NOT EXISTS portfolio_items (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  image_urls jsonb DEFAULT '[]',
  category text NOT NULL,
  title text,
  description text,
  sort_order integer DEFAULT 0,
  created_at timestamptz DEFAULT now()
);
ALTER TABLE portfolio_items DISABLE ROW LEVEL SECURITY;
-- If table already exists, add the title column:
ALTER TABLE portfolio_items ADD COLUMN IF NOT EXISTS title text;</pre>
    </div>
    <button onclick="loadPortfolioItems().then(renderPortfolioTab)" class="btn-gold" style="padding:9px 20px;border-radius:6px;font-size:11px">↺ Retry After Running SQL</button>
  </div>` : '';

  document.getElementById('tabContent').innerHTML = `
  <div style="margin-bottom:28px">
    <h2 class="cinzel" style="font-size:24px;font-weight:700;margin-bottom:4px"><span class="gold-text">Portfolio Content</span></h2>
    <p style="color:rgba(255,255,255,.4);font-size:13px">Manage content for About Us, Specialities, Achievements &amp; Future Goals sections</p>
  </div>

  ${dbAlert}

  <!-- Upload Form -->
  <div class="card" style="margin-bottom:24px">
    <h3 class="cinzel" style="font-size:13px;color:#E8CC6A;margin-bottom:20px;letter-spacing:1px">ADD NEW PORTFOLIO ITEM</h3>

    <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">

      <!-- Image Upload -->
      <div style="grid-column:1/-1">
        <label class="label">Upload Image(s) * <span style="color:rgba(255,255,255,.3);font-size:9px">(select multiple — all become one card with a slider)</span></label>
        <div class="upload-zone" id="portfolioUploadZone" onclick="document.getElementById('portfolioImgFile').click()"
             ondragover="event.preventDefault();this.classList.add('dragover')"
             ondragleave="this.classList.remove('dragover')"
             ondrop="handlePortfolioDrop(event)">
          <div id="portfolioPreviewWrap">
            <div style="font-size:40px;margin-bottom:10px">📷</div>
            <p class="cinzel" style="font-size:11px;color:#C9A020;letter-spacing:1px;margin-bottom:4px">CLICK OR DRAG TO UPLOAD IMAGES</p>
            <p style="font-size:12px;color:rgba(255,255,255,.3)">Select one or multiple images · JPG, PNG, WEBP · Max 10MB each</p>
          </div>
          <div id="portfolioUploadProgress" style="display:none;margin-top:12px">
            <div class="progress-bar"><div class="progress-fill" id="portfolioProgressFill" style="width:0%"></div></div>
            <p style="font-size:11px;color:#C9A020;margin-top:6px" id="portfolioUploadStatus">Uploading...</p>
          </div>
        </div>
        <input type="file" id="portfolioImgFile" accept="image/*" multiple style="display:none" onchange="handlePortfolioFileSelect(this)"/>
      </div>

      <!-- Category Select -->
      <div>
        <label class="label">Section / Category *</label>
        <select class="select-field" id="pCategory">
          <option value="" disabled selected>Select a section…</option>
          ${catOptions}
        </select>
      </div>

      <!-- Title -->
      <div>
        <label class="label">Title *</label>
        <input class="input-field" id="pTitle" type="text" placeholder="e.g. Premium Quality Fabrics"/>
      </div>

      <!-- Description -->
      <div>
        <label class="label">Description</label>
        <textarea class="input-field" id="pDescription" rows="3" placeholder="Describe this item in detail…"></textarea>
      </div>

    </div>

    <button class="btn-gold" id="savePortfolioBtn" onclick="savePortfolioItem()" style="padding:13px 36px;border-radius:8px;font-size:12px">✅ Save Portfolio Item</button>
  </div>

  <!-- Existing Items grouped by section -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 class="cinzel" style="font-size:14px;color:#E8CC6A;letter-spacing:1px">CURRENT PORTFOLIO ITEMS (${totalItems})</h3>
      <div style="display:flex;gap:8px;flex-wrap:wrap" id="catFilterBtns">
        <button onclick="filterPortfolio('all')" class="cat-filter-btn active" data-cat="all" style="padding:5px 14px;border-radius:20px;border:1px solid rgba(212,175,55,.4);background:rgba(212,175,55,.15);color:#E8CC6A;font-family:'Cinzel',serif;font-size:10px;cursor:pointer;letter-spacing:.5px">All</button>
        ${PORTFOLIO_CATEGORIES.map(c => `<button onclick="filterPortfolio('${c.key}')" class="cat-filter-btn" data-cat="${c.key}" style="padding:5px 14px;border-radius:20px;border:1px solid rgba(212,175,55,.2);background:transparent;color:rgba(255,255,255,.5);font-family:'Cinzel',serif;font-size:10px;cursor:pointer;letter-spacing:.5px">${c.label}</button>`).join('')}
      </div>
    </div>
    <div id="portfolioItemsList" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px" class="pitem-grid">
      ${portfolioItems.length === 0
        ? '<p style="color:rgba(255,255,255,.3);text-align:center;padding:60px;grid-column:1/-1">No portfolio items yet. Add your first item above.</p>'
        : portfolioItems.map(p => portfolioItemCardHTML(p)).join('')}
    </div>
  </div>`;
}

function toggleDbSetup() {
  const el = document.getElementById('dbSetupContent');
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}
function copySql() {
  const text = document.getElementById('setupSql').textContent;
  navigator.clipboard.writeText(text).then(() => notify('SQL copied to clipboard!', 'success'));
}

function getCatInfo(key) {
  return PORTFOLIO_CATEGORIES.find(c => c.key === key) || { label: key, color: '#9CA3AF' };
}

function parseUrls(item) {
  if (item.image_urls) {
    try {
      const arr = Array.isArray(item.image_urls) ? item.image_urls : JSON.parse(item.image_urls);
      if (arr && arr.length > 0) return arr;
    } catch(e) {}
  }
  if (item.image_url) return [item.image_url];
  return [];
}

function portfolioItemCardHTML(item) {
  const images = parseUrls(item);
  const hasMultiple = images.length > 1;
  const catInfo = getCatInfo(item.category);
  const cardId = 'pitem-' + item.id;

  // ── IMAGE SECTION ──
  let imgSection = '';
  if (images.length === 0) {
    imgSection = `<div style="height:200px;background:linear-gradient(135deg,#1a0535,#3B0764);display:flex;align-items:center;justify-content:center"><span style="font-size:44px;opacity:.35">🖼️</span></div>`;
  } else if (hasMultiple) {
    const slidesHTML = images.map(url =>
      `<div class="pitem-slide"><img src="${url}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.opacity='.2'"/></div>`
    ).join('');
    const dotsHTML = images.map((_, i) =>
      `<button class="pitem-dot${i === 0 ? ' active' : ''}" onclick="movePitemSlide('${cardId}',${i},true)"></button>`
    ).join('');
    imgSection = `<div class="pitem-slider" id="${cardId}" style="height:200px">
      <div class="pitem-track" style="display:flex;height:100%">${slidesHTML}</div>
      <button class="pitem-arrow" onclick="movePitemSlide('${cardId}',-1,false)" style="left:6px">‹</button>
      <button class="pitem-arrow" onclick="movePitemSlide('${cardId}',1,false)" style="right:6px">›</button>
      <div class="pitem-dots">${dotsHTML}</div>
    </div>`;
  } else {
    imgSection = `<div style="height:200px;overflow:hidden"><img src="${images[0]}" style="width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'" onerror="this.style.opacity='.2'"/></div>`;
  }

  const countBadge = hasMultiple ? `<span style="background:rgba(0,0,0,.55);color:#E8CC6A;font-size:9px;padding:3px 8px;border-radius:10px;font-family:'Cinzel',serif;letter-spacing:.5px">${images.length} photos</span>` : '';

  // ── CARD LAYOUT: Image → Category badge → Title → Description ──
  return `<div class="pitem-card" id="picard-${item.id}" style="display:flex;flex-direction:column">

    <!-- Image with overlaid category badge -->
    <div style="position:relative;flex-shrink:0">
      ${imgSection}
      <div style="position:absolute;top:10px;left:10px;display:flex;gap:6px;align-items:center;z-index:5">
        <span class="category-badge" style="background:${catInfo.color}33;color:${catInfo.color};border:1px solid ${catInfo.color}55;backdrop-filter:blur(4px)">${catInfo.label}</span>
        ${countBadge}
      </div>
    </div>

    <!-- Title + Description body -->
    <div style="padding:16px 16px 14px;flex:1;display:flex;flex-direction:column;gap:8px;border-top:1px solid rgba(212,175,55,.12)">

      <!-- Title -->
      <h3 style="font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#E8CC6A;letter-spacing:.8px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
        ${item.title || '<span style="color:rgba(212,175,55,.3);font-weight:400;font-style:italic">No title</span>'}
      </h3>

      <!-- Thin gold divider -->
      <div style="height:1px;background:linear-gradient(90deg,rgba(212,175,55,.4),transparent)"></div>

      <!-- Description -->
      <p style="font-size:12px;color:rgba(255,255,255,.65);line-height:1.65;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical">
        ${item.description || '<span style="color:rgba(255,255,255,.2);font-style:italic">No description added</span>'}
      </p>

      <!-- Footer row -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
        <span style="font-size:9px;color:rgba(255,255,255,.2);font-family:'Cinzel',serif;letter-spacing:.5px">
          ${item.created_at ? new Date(item.created_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : ''}
        </span>
        <button onclick="delPortfolioItem('${item.id}')" class="btn-danger" style="padding:5px 12px;font-size:10px;border-radius:6px">🗑 Delete</button>
      </div>
    </div>

  </div>`;
}

// ── FILTER ──
function filterPortfolio(cat) {
  // Update button styles
  document.querySelectorAll('.cat-filter-btn').forEach(btn => {
    const isActive = btn.dataset.cat === cat;
    btn.style.background = isActive ? 'rgba(212,175,55,.15)' : 'transparent';
    btn.style.color = isActive ? '#E8CC6A' : 'rgba(255,255,255,.5)';
    btn.style.borderColor = isActive ? 'rgba(212,175,55,.4)' : 'rgba(212,175,55,.2)';
  });

  const list = document.getElementById('portfolioItemsList');
  if (!list) return;
  const items = cat === 'all' ? portfolioItems : portfolioItems.filter(p => p.category === cat);
  list.innerHTML = items.length === 0
    ? `<p style="color:rgba(255,255,255,.3);text-align:center;padding:60px;grid-column:1/-1">No items in this section yet.</p>`
    : items.map(p => portfolioItemCardHTML(p)).join('');
}

// ── PORTFOLIO UPLOAD ──
async function handlePortfolioFileSelect(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  await uploadPortfolioFiles(files);
}
function handlePortfolioDrop(e) {
  e.preventDefault();
  document.getElementById('portfolioUploadZone').classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) { notify('Please drop image files.', 'error'); return; }
  uploadPortfolioFiles(files);
}
async function uploadPortfolioFiles(files) {
  const prog = document.getElementById('portfolioUploadProgress');
  const fill = document.getElementById('portfolioProgressFill');
  const status = document.getElementById('portfolioUploadStatus');
  const prevWrap = document.getElementById('portfolioPreviewWrap');
  prog.style.display = 'block'; prevWrap.style.opacity = '0.4';
  pendingPortfolioUrls = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (file.size > 10 * 1024 * 1024) { notify(`${file.name} too large (max 10MB), skipped.`, 'error'); continue; }
    fill.style.width = Math.round(((i + 0.5) / files.length) * 100) + '%';
    status.textContent = `Uploading ${i + 1} of ${files.length}: ${file.name}`;
    const ext = file.name.split('.').pop().toLowerCase();
    const fileName = `portfolio/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(fileName, file, { cacheControl: '3600', upsert: true });
    if (error) { notify(`Failed: ${file.name} — ${error.message}`, 'error'); continue; }
    const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
    pendingPortfolioUrls.push(urlData.publicUrl);
  }
  fill.style.width = '100%';
  status.textContent = `✅ ${pendingPortfolioUrls.length} of ${files.length} uploaded!`;
  prevWrap.style.opacity = '1';
  if (pendingPortfolioUrls.length > 0) {
    prevWrap.innerHTML = `<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px">
      ${pendingPortfolioUrls.map(url => `<img src="${url}" style="height:70px;width:120px;object-fit:cover;border-radius:6px;border:1px solid rgba(212,175,55,.4)"/>`).join('')}
    </div><p style="color:#4ade80;font-size:12px">${pendingPortfolioUrls.length} image(s) ready — choose category and save below</p>`;
    notify(`✅ ${pendingPortfolioUrls.length} image(s) ready!`, 'success');
  }
  setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 2000);
}

async function savePortfolioItem() {
  if (!pendingPortfolioUrls.length) { notify('Please upload at least one image first.', 'error'); return; }
  const category = document.getElementById('pCategory').value;
  if (!category) { notify('Please select a section/category.', 'error'); return; }
  const title = (document.getElementById('pTitle').value || '').trim() || null;
  if (!title) { notify('Please enter a title for this item.', 'error'); return; }
  const description = (document.getElementById('pDescription').value || '').trim() || null;

  const btn = document.getElementById('savePortfolioBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span> Saving...';

  const row = {
    image_urls: JSON.stringify(pendingPortfolioUrls),
    category,
    title,
    description,
    sort_order: portfolioItems.filter(p => p.category === category).length,
  };

  const { error } = await sb.from('portfolio_items').insert([row]);
  if (error) {
    notify('Error saving item: ' + error.message, 'error');
    btn.disabled = false; btn.textContent = '✅ Save Portfolio Item';
    return;
  }

  notify('✅ Portfolio item saved!', 'success');
  pendingPortfolioUrls = [];

  // Reset form
  document.getElementById('pCategory').value = '';
  document.getElementById('pTitle').value = '';
  document.getElementById('pDescription').value = '';
  document.getElementById('portfolioPreviewWrap').innerHTML = `<div style="font-size:40px;margin-bottom:10px">📷</div>
    <p class="cinzel" style="font-size:11px;color:#C9A020;letter-spacing:1px;margin-bottom:4px">CLICK OR DRAG TO UPLOAD IMAGES</p>
    <p style="font-size:12px;color:rgba(255,255,255,.3)">Select one or multiple images · JPG, PNG, WEBP · Max 10MB each</p>`;
  document.getElementById('portfolioImgFile').value = '';
  btn.disabled = false; btn.textContent = '✅ Save Portfolio Item';

  await loadPortfolioItems();
  const list = document.getElementById('portfolioItemsList');
  if (list) list.innerHTML = portfolioItems.length === 0
    ? '<p style="color:rgba(255,255,255,.3);text-align:center;padding:60px;grid-column:1/-1">No items yet.</p>'
    : portfolioItems.map(p => portfolioItemCardHTML(p)).join('');

  // Update count header
  const countEl = document.querySelector('#tabContent .cinzel');
  if (countEl && countEl.textContent.includes('CURRENT')) countEl.textContent = `CURRENT PORTFOLIO ITEMS (${portfolioItems.length})`;
}

async function delPortfolioItem(id) {
  if (!confirm('Delete this portfolio item? This cannot be undone.')) return;
  const { error } = await sb.from('portfolio_items').delete().eq('id', id);
  if (error) { notify('Error: ' + error.message, 'error'); return; }
  notify('🗑 Item deleted.', 'info');
  await loadPortfolioItems();
  const list = document.getElementById('portfolioItemsList');
  if (list) list.innerHTML = portfolioItems.length === 0
    ? '<p style="color:rgba(255,255,255,.3);text-align:center;padding:60px;grid-column:1/-1">No portfolio items yet.</p>'
    : portfolioItems.map(p => portfolioItemCardHTML(p)).join('');
}

// ── ADMIN PORTFOLIO ITEM SLIDER ──
function movePitemSlide(cardId, valOrDir, isAbsolute) {
  const el = document.getElementById(cardId);
  if (!el) return;
  const track = el.querySelector('.pitem-track');
  const count = track.children.length;
  if (isAbsolute) {
    pitemSlideIdx[cardId] = valOrDir;
  } else {
    pitemSlideIdx[cardId] = ((pitemSlideIdx[cardId] || 0) + valOrDir + count) % count;
  }
  const i = pitemSlideIdx[cardId];
  track.style.transform = `translateX(-${i * 100}%)`;
  el.querySelectorAll('.pitem-dot').forEach((d, idx) => d.classList.toggle('active', idx === i));
}

// ── NOTIFY ──
function notify(msg, type = 'info') {
  const cols = { success: ['#14532d', '#86efac', '#22c55e'], error: ['#450a0a', '#f87171', '#ef4444'], info: ['#1c1a36', '#a78bfa', '#7c3aed'] };
  const [bg, text, border] = cols[type] || cols.info;
  const el = document.createElement('div');
  el.className = 'notify';
  el.style.cssText += `background:${bg};color:${text};border-color:${border}40;transition:opacity .4s`;
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; }, 3200);
  setTimeout(() => el.remove(), 3600);
}

// ── INIT ──
init();
</script>
