<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Libas Admin Panel</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>

<noscript><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Lato',sans-serif;background:#0f0a1e;color:#e2e8f0;min-height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#1a1030}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:3px}
.cinzel{font-family:'Cinzel',serif}

@keyframes shimmer{0%{background-position:-400% center}100%{background-position:400% center}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.gold-text{background:linear-gradient(90deg,#C9A020,#E8CC6A,#C9A020);background-size:300% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}

.spinner{width:28px;height:28px;border:3px solid rgba(212,175,55,.2);border-top-color:#D4AF37;border-radius:50%;animation:spin .8s linear infinite}
.spinner-sm{width:18px;height:18px;border:2px solid rgba(212,175,55,.2);border-top-color:#D4AF37;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}

.btn-gold{background:linear-gradient(135deg,#C9A020,#E8CC6A,#C9A020);background-size:200% auto;color:#180626;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1.5px;border:none;cursor:pointer;transition:all .3s;font-size:12px}
.btn-gold:hover{background-position:right center;box-shadow:0 6px 24px rgba(212,175,55,.4);transform:translateY(-1px)}
.btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none}

.btn-danger{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;transition:all .2s;padding:6px 12px;border-radius:6px}
.btn-danger:hover{background:rgba(220,38,38,.3)}

.btn-edit{background:rgba(124,58,237,.15);color:#a78bfa;border:1px solid rgba(124,58,237,.3);font-family:'Cinzel',serif;font-size:11px;cursor:pointer;transition:all .2s;padding:6px 12px;border-radius:6px}
.btn-edit:hover{background:rgba(124,58,237,.3)}

.btn-outline{background:transparent;color:#D4AF37;font-family:'Cinzel',serif;font-weight:600;letter-spacing:1px;border:1px solid rgba(212,175,55,.5);cursor:pointer;transition:all .3s;font-size:12px}
.btn-outline:hover{background:rgba(212,175,55,.1)}

.input-field{width:100%;padding:10px 14px;border:1px solid rgba(212,175,55,.2);border-radius:8px;background:rgba(255,255,255,.05);font-family:'Lato',sans-serif;font-size:14px;color:#e2e8f0;outline:none;transition:border-color .2s}
.input-field:focus{border-color:#7C3AED;background:rgba(255,255,255,.08)}
.input-field::placeholder{color:rgba(255,255,255,.3)}
textarea.input-field{resize:vertical}

.select-field{width:100%;padding:10px 14px;border:1px solid rgba(212,175,55,.2);border-radius:8px;background:rgba(15,10,30,.9);font-family:'Lato',sans-serif;font-size:14px;color:#e2e8f0;outline:none;cursor:pointer}
.select-field:focus{border-color:#7C3AED}

.card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:24px}

.label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#C9A020;display:block;margin-bottom:6px;text-transform:uppercase}

.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;border:1px solid rgba(212,175,55,.2);background:transparent;color:#e2e8f0;cursor:pointer;font-size:12px;font-family:'Lato',sans-serif;transition:all .2s}
.chip:hover{border-color:rgba(212,175,55,.5)}
.chip.selected{background:rgba(59,7,100,.5);border-color:#D4AF37;color:#E8CC6A}

.tag-new{background:linear-gradient(135deg,#C9A020,#E8CC6A);color:#180626;font-family:'Cinzel',serif;font-size:9px;font-weight:700;letter-spacing:2px;padding:2px 8px;border-radius:2px}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid rgba(212,175,55,.12)}
table{width:100%;border-collapse:collapse}
thead th{background:rgba(59,7,100,.6);color:#E8CC6A;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:12px 16px;text-align:left;white-space:nowrap}
tbody td{padding:12px 16px;border-bottom:1px solid rgba(212,175,55,.08);font-size:13px;vertical-align:middle}
tbody tr:hover td{background:rgba(212,175,55,.04)}
tbody tr:last-child td{border-bottom:none}

.sidebar{width:220px;background:rgba(255,255,255,.03);border-right:1px solid rgba(212,175,55,.1);min-height:100vh;position:fixed;left:0;top:0;padding-top:80px;z-index:10}
.sidebar-btn{display:flex;align-items:center;gap:10px;width:100%;padding:12px 20px;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.5px;transition:all .2s;border-left:2px solid transparent;text-align:left}
.sidebar-btn:hover{background:rgba(212,175,55,.06);color:#E8CC6A;border-left-color:rgba(212,175,55,.4)}
.sidebar-btn.active{background:rgba(124,58,237,.15);color:#E8CC6A;border-left-color:#D4AF37}

.notify{position:fixed;top:20px;right:20px;z-index:9999;min-width:260px;padding:14px 18px;border-radius:10px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.5px;box-shadow:0 8px 32px rgba(0,0,0,.5);border:1px solid;animation:fadeUp .3s ease;display:flex;align-items:center;gap:10px}

.progress-bar{height:3px;background:rgba(212,175,55,.2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#C9A020,#E8CC6A);border-radius:3px;transition:width .3s}

.stat-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.12);border-radius:12px;padding:20px 24px;display:flex;gap:16px;align-items:center}

.img-preview{width:80px;height:80px;border-radius:8px;border:1px solid rgba(212,175,55,.2);object-fit:cover;background:rgba(59,7,100,.3);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;overflow:hidden}

/* Upload drop zone */
.upload-zone{border:2px dashed rgba(212,175,55,.3);border-radius:10px;padding:32px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(212,175,55,.03)}
.upload-zone:hover,.upload-zone.dragover{border-color:#D4AF37;background:rgba(212,175,55,.08)}

/* Banner card */
.banner-card{background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.15);border-radius:10px;overflow:hidden;transition:all .2s}
.banner-card:hover{border-color:rgba(212,175,55,.4)}

@media(max-width:768px){
  .sidebar{display:none}
  .main-content{margin-left:0!important}
  .stat-grid{grid-template-columns:1fr 1fr!important}
  .form-grid{grid-template-columns:1fr!important}
}

/* CONFIRM MODAL */
#confirmModal{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);align-items:center;justify-content:center}
#confirmModal.open{display:flex}
.confirm-box{background:linear-gradient(145deg,#1a0535,#160d2e);border:1px solid rgba(212,175,55,.3);border-radius:14px;padding:32px 28px;width:90%;max-width:360px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.7)}

/* ORDER SEARCH */
.order-search-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px}

/* ORDER ROW ACTIONS */
.order-del-btn{background:rgba(220,38,38,.12);color:#f87171;border:1px solid rgba(220,38,38,.25);border-radius:6px;padding:5px 10px;cursor:pointer;font-size:13px;transition:all .2s;line-height:1}
.order-del-btn:hover{background:rgba(220,38,38,.28);border-color:rgba(220,38,38,.5);transform:scale(1.08)}

/* CART ITEMS EXPAND */
.cart-items-btn{background:rgba(124,58,237,.12);color:#a78bfa;border:1px solid rgba(124,58,237,.25);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:'Cinzel',serif;transition:all .2s}
.cart-items-btn:hover{background:rgba(124,58,237,.25)}
.cart-items-popup{display:none;position:absolute;z-index:100;background:#1a0d30;border:1px solid rgba(212,175,55,.25);border-radius:10px;padding:14px;min-width:240px;box-shadow:0 12px 40px rgba(0,0,0,.6);top:100%;left:0;margin-top:4px}
.cart-items-popup.open{display:block}

/* TABLE IMPROVEMENTS */
thead th{background:rgba(59,7,100,.6);color:#E8CC6A;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:12px 16px;text-align:left;white-space:nowrap;position:sticky;top:0;z-index:2}
tbody td{padding:10px 14px;border-bottom:1px solid rgba(212,175,55,.07);font-size:13px;vertical-align:middle}
tbody tr:hover td{background:rgba(212,175,55,.04)}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}

/* SCROLLABLE TABLE */
.table-scroll{overflow-x:auto;border-radius:10px;border:1px solid rgba(212,175,55,.12);max-height:65vh;overflow-y:auto}

/* CONTAIN for perf */
.main-content{contain:layout style}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loadingScreen" style="position:fixed;inset:0;background:#0f0a1e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px">
  <div class="spinner"></div>
  <p class="cinzel" style="font-size:13px;color:#C9A020;letter-spacing:3px">LIBAS ADMIN</p>
</div>

<!-- CONFIRM MODAL -->
<div id="confirmModal">
  <div class="confirm-box">
    <div id="confirmIcon" style="font-size:44px;margin-bottom:12px">🗑</div>
    <h3 class="cinzel" id="confirmTitle" style="font-size:16px;color:#E8CC6A;letter-spacing:1.5px;margin-bottom:8px">DELETE ORDER</h3>
    <p id="confirmMsg" style="font-size:13px;color:rgba(255,255,255,.55);line-height:1.7;margin-bottom:24px">Are you sure? This cannot be undone.</p>
    <div style="display:flex;gap:10px">
      <button id="confirmCancel" onclick="closeConfirm()" style="flex:1;padding:11px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-family:'Cinzel',serif;font-size:12px;cursor:pointer;transition:background .2s" onmouseover="this.style.background='rgba(255,255,255,.1)'" onmouseout="this.style.background='rgba(255,255,255,.06)'">Cancel</button>
      <button id="confirmOk" style="flex:1;padding:11px;border-radius:8px;background:rgba(220,38,38,.2);border:1px solid rgba(220,38,38,.4);color:#f87171;font-family:'Cinzel',serif;font-size:12px;cursor:pointer;font-weight:700;transition:all .2s" onmouseover="this.style.background='rgba(220,38,38,.35)'" onmouseout="this.style.background='rgba(220,38,38,.2)'">Delete</button>
    </div>
  </div>
</div>

<!-- MAIN ADMIN APP -->
<div id="adminApp" style="display:none">
  <!-- Sidebar -->
  <div class="sidebar">
    <div style="padding:20px;border-bottom:1px solid rgba(212,175,55,.1);position:fixed;top:0;left:0;width:220px;background:#0f0a1e;z-index:11">
      <h1 class="cinzel" style="font-size:20px;font-weight:700"><span class="gold-text">Libas</span></h1>
      <p class="cinzel" style="font-size:7px;letter-spacing:4px;color:#E8CC6A;opacity:.6;margin-top:2px">ADMIN PANEL</p>
    </div>
    <button class="sidebar-btn active" id="navDashboard" onclick="showTab('dashboard')">📊 Dashboard</button>
    <button class="sidebar-btn" id="navProducts" onclick="showTab('products')">🧵 All Products</button>
    <button class="sidebar-btn" id="navAdd" onclick="showTab('add')">➕ Add Product</button>
    <button class="sidebar-btn" id="navBanners" onclick="showTab('banners')">🖼️ Banner Images</button>
    <button class="sidebar-btn" id="navSetup" onclick="showTab('setup')">⚙️ DB Setup / Fix</button>
    <button class="sidebar-btn" id="navOrders" onclick="showTab('orders')">📦 Order Details <span id="ordersCountBadge" style="display:none;margin-left:auto;background:#7C3AED;color:#fff;font-size:9px;padding:2px 7px;border-radius:10px;font-family:'Lato',sans-serif;font-weight:700"></span></button>
    <button class="sidebar-btn" id="navThaanPwd" onclick="showTab('thaanpwd')">🔑 Wholesale Password</button>

  </div>

  <!-- Main content -->
  <div class="main-content" style="margin-left:220px;padding:30px;min-height:100vh">
    <div id="tabContent"></div>
  </div>
</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ╔══════════════════════════════════════════════╗
// ║         SUPABASE CONFIGURATION               ║

const STORAGE_BUCKET = 'product_images';

// ── STATE ──
let products = [];
let banners  = [];
let editingId = null;
let form = blank();
let selectedColors = [], selectedSizes = [];

function blank() {
  return { name:'', category:'Shirting', subcategory:'Linen', brand:'Libas', price:'', stock:'', sizes:[], is_new:false, description:'', image_url:'', image_urls:[] };
}

// ── INIT ──
async function init() {
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
  await Promise.all([loadProducts(), loadBanners(), loadOrders()]);
  showTab('dashboard');
}

async function doLogout() {}
function showAdmin(user) {}

// ── DATA LOAD ──
async function loadProducts() {
  const { data, error } = await sb.from('products').select('*').order('created_at', { ascending: false });
  if (error) { notify('Error loading products: ' + error.message, 'error'); return; }
  products = data || [];
}

async function loadBanners() {
  const { data, error } = await sb.from('banner_images').select('*').order('sort_order', { ascending: true });
  if (error) { console.error('Banner load error:', error); banners = []; return; }
  banners = data || [];
}

// ── TABS ──
function showTab(tab) {
  ['dashboard','products','add','banners','setup','orders','thaanpwd'].forEach(t => {
    const btn = document.getElementById('nav' + t.charAt(0).toUpperCase() + t.slice(1));
    if (btn) btn.classList.toggle('active', t === tab);
  });
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'products') renderProducts();
  else if (tab === 'add') { editingId = null; form = blank(); initSelections(); renderForm(); }
  else if (tab === 'banners') renderBannersTab();
  else if (tab === 'setup') renderSetup();
  else if (tab === 'orders') renderOrders();
  else if (tab === 'thaanpwd') renderThaanPwd();
}

function renderSetup() {
  document.getElementById('tabContent').innerHTML = `
  <div style="margin-bottom:28px">
    <h2 class="cinzel" style="font-size:24px;font-weight:700;margin-bottom:4px"><span class="gold-text">Database Setup & Fix</span></h2>
    <p style="color:rgba(255,255,255,.4);font-size:13px">Run these SQL commands in your Supabase SQL Editor to fix upload issues</p>
  </div>

  <div class="card" style="margin-bottom:20px">
    <h3 class="cinzel" style="font-size:13px;color:#E8CC6A;margin-bottom:16px;letter-spacing:1px">STEP 1 — CONNECTION TEST</h3>
    <button class="btn-gold" onclick="testConnection()" style="padding:11px 24px;border-radius:8px;font-size:12px">🔌 Test Supabase Connection</button>
    <div id="connResult" style="margin-top:14px;font-size:13px"></div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <h3 class="cinzel" style="font-size:13px;color:#E8CC6A;margin-bottom:4px;letter-spacing:1px">STEP 2 — PRODUCTS TABLE + RLS FIX</h3>
    <p style="color:rgba(255,255,255,.4);font-size:12px;margin-bottom:16px">Go to <b style="color:#C9A020">Supabase → SQL Editor → New Query</b> and paste this:</p>
    <div style="background:#0a0a1a;border:1px solid rgba(212,175,55,.2);border-radius:8px;padding:16px;font-family:monospace;font-size:12px;color:#a5f3fc;line-height:2;position:relative">
      <button onclick="copySQL('sqlProducts')" style="position:absolute;top:10px;right:10px;background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#E8CC6A;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif">COPY</button>
      <pre id="sqlProducts" style="white-space:pre-wrap;margin:0;color:#a5f3fc">-- Create products table (skip if already exists)
CREATE TABLE IF NOT EXISTS products (
  id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
  name text NOT NULL,
  category text,
  subcategory text,
  brand text,
  price numeric,
  stock integer DEFAULT 0,
  description text,
  image_url text,
  colors jsonb DEFAULT '[]',
  sizes jsonb DEFAULT '[]',
  is_new boolean DEFAULT false,
  created_at timestamptz DEFAULT now()
);

-- DISABLE Row Level Security (allows anon key to insert/update/delete)
ALTER TABLE products DISABLE ROW LEVEL SECURITY;

-- OR if you want RLS enabled, add a permissive policy instead:
-- ALTER TABLE products ENABLE ROW LEVEL SECURITY;
-- CREATE POLICY "allow_all" ON products FOR ALL USING (true) WITH CHECK (true);</pre>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <h3 class="cinzel" style="font-size:13px;color:#E8CC6A;margin-bottom:4px;letter-spacing:1px">STEP 3 — BANNER IMAGES TABLE</h3>
    <p style="color:rgba(255,255,255,.4);font-size:12px;margin-bottom:16px">Run this SQL too for banner slider support:</p>
    <div style="background:#0a0a1a;border:1px solid rgba(212,175,55,.2);border-radius:8px;padding:16px;font-family:monospace;font-size:12px;color:#a5f3fc;line-height:2;position:relative">
      <button onclick="copySQL('sqlBanners')" style="position:absolute;top:10px;right:10px;background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#E8CC6A;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif">COPY</button>
      <pre id="sqlBanners" style="white-space:pre-wrap;margin:0;color:#a5f3fc">-- banner_images table already exists — just disable RLS
ALTER TABLE banner_images DISABLE ROW LEVEL SECURITY;

-- If you need to recreate it from scratch, run this instead:
-- DROP TABLE IF EXISTS banner_images;
-- CREATE TABLE banner_images (
--   id uuid DEFAULT gen_random_uuid() PRIMARY KEY,
--   image_url text NOT NULL,
--   title text,
--   subtitle text,
--   sort_order integer DEFAULT 0,
--   is_active boolean DEFAULT true,
--   created_at timestamptz DEFAULT now()
-- );
-- ALTER TABLE banner_images DISABLE ROW LEVEL SECURITY;</pre>
    </div>
  </div>

  <div class="card" style="margin-bottom:20px">
    <h3 class="cinzel" style="font-size:13px;color:#E8CC6A;margin-bottom:4px;letter-spacing:1px">STEP 5 — ORDERS TABLE (for Shipping & Orders feature)</h3>

async function testConnection() {
  const res = document.getElementById('connResult');
  res.innerHTML = '<span style="color:#C9A020">Testing...</span>';
  try {
    // Test read
    const { data, error } = await sb.from('products').select('id').limit(1);
    if (error) {
      res.innerHTML = `<div style="color:#f87171;background:rgba(220,38,38,.1);padding:12px;border-radius:8px;border:1px solid rgba(220,38,38,.3)">
        ❌ <b>Read failed:</b> ${error.message}<br/>
        <span style="font-size:11px;color:rgba(255,255,255,.4)">Code: ${error.code || 'unknown'} · Check Step 2 above</span>
      </div>`;
      return;
    }
    // Test insert
    const { error: insErr } = await sb.from('products').insert([{ name:'__test__', price:1, category:'Shirting', subcategory:'Linen', brand:'Test', stock:0, colors:[], sizes:[], is_new:false, description:'', image_url:'' }]);
    if (insErr) {
      res.innerHTML = `<div style="color:#fbbf24;background:rgba(245,158,11,.1);padding:12px;border-radius:8px;border:1px solid rgba(245,158,11,.3)">
        ⚠️ <b>Read OK, but Insert blocked:</b> ${insErr.message}<br/>
        <span style="font-size:11px;color:rgba(255,255,255,.4)">This is the cause of upload failures. Run Step 2 SQL to fix.</span>
      </div>`;
      return;
    }
    // Clean up test row
    await sb.from('products').delete().eq('name','__test__');
    res.innerHTML = `<div style="color:#4ade80;background:rgba(22,163,74,.1);padding:12px;border-radius:8px;border:1px solid rgba(22,163,74,.3)">
      ✅ <b>All good!</b> Supabase connection working. Read & Insert both succeed.
    </div>`;
  } catch(e) {
    res.innerHTML = `<div style="color:#f87171">❌ Exception: ${e.message}</div>`;
  }
}

let _filterTimer = null;
function filterTable() {
  clearTimeout(_filterTimer);
  _filterTimer = setTimeout(() => {
    const q = (document.getElementById('searchProd').value || '').toLowerCase();
    const list = products.filter(p => (p.name||'').toLowerCase().includes(q) || (p.brand||'').toLowerCase().includes(q) || (p.subcategory||'').toLowerCase().includes(q));
    renderTable(list);
  }, 120);
}

function parseArr(v) {
  if (Array.isArray(v)) return v;
  if (typeof v === 'string') { try { return JSON.parse(v); } catch { return v.split(',').map(x=>x.trim()).filter(Boolean); } }
  return [];
}

// ── IMAGE UPLOAD FOR PRODUCTS (multi-file) ──
async function uploadProdImages(input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const prog = document.getElementById('prodUploadProgress');
  const fill = document.getElementById('prodProgressFill');
  const status = document.getElementById('prodUploadStatus');
  const previews = document.getElementById('prodImagePreviews');
  const inner = document.getElementById('prodUploadInner');
  prog.style.display = 'block';
  inner.style.opacity = '0.4';
  let uploadedUrls = [];
  for (let i = 0; i < files.length; i++) {
    const file = files[i];
    if (!file.type.startsWith('image/')) continue;
    if (file.size > 10 * 1024 * 1024) { notify(`${file.name} is too large (max 10MB), skipped.`, 'error'); continue; }
    fill.style.width = Math.round(((i + 0.5) / files.length) * 100) + '%';
    status.textContent = `Uploading ${i + 1} of ${files.length}: ${file.name}`;
    const ext = file.name.split('.').pop().toLowerCase();
    const fileName = `products/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(fileName, file, { cacheControl: '3600', upsert: true });
    if (error) { notify(`Failed: ${file.name} — ${error.message}`, 'error'); continue; }
    const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
    uploadedUrls.push(urlData.publicUrl);
  }
  fill.style.width = '100%';
  status.textContent = `✅ ${uploadedUrls.length} of ${files.length} uploaded!`;
  inner.style.opacity = '1';
  if (uploadedUrls.length > 0) {
    // Save first image as main, all images in fImgAll
    document.getElementById('fImg').value = uploadedUrls[0];
    window._prodImgUrls = uploadedUrls.slice();
    // Show previews
    previews.innerHTML = uploadedUrls.map((url, idx) => `
      <div style="position:relative;width:90px;height:90px;border-radius:8px;overflow:hidden;border:2px solid ${idx===0?'#D4AF37':'rgba(212,175,55,.3)'}">
        <img src="${url}" style="width:100%;height:100%;object-fit:cover"/>
        ${idx===0?'<span style="position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);font-size:9px;text-align:center;color:#E8CC6A;padding:2px;font-family:Cinzel,serif">MAIN</span>':''}
      </div>`).join('');
    notify(`✅ ${uploadedUrls.length} image(s) uploaded successfully!`, 'success');
  }
  setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 2000);
}

function handleProdDrop(e) {
  e.preventDefault();
  document.getElementById('prodUploadZone').classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (!files.length) return;
  const inp = document.getElementById('prodImgFile');
  const dt = new DataTransfer();
  Array.from(files).forEach(f => { if (f.type.startsWith('image/')) dt.items.add(f); });
  if (!dt.files.length) { notify('Please drop image files.', 'error'); return; }
  inp.files = dt.files;
  uploadProdImages(inp);
}

async function saveProduct() {
  const name  = (document.getElementById('fName').value || '').trim();
  const price = parseFloat(document.getElementById('fPrice').value || '0');
  if (!name) { notify('Product name is required', 'error'); return; }
  if (!price || price <= 0) { notify('Valid price is required', 'error'); return; }

  const payload = {
    name,
    category:    document.getElementById('fCat').value,
    subcategory: document.getElementById('fSub').value,
    brand:       (document.getElementById('fBrand').value || '').trim(),
    price,
    stock:       parseInt(document.getElementById('fStock').value || '0') || 0,
    description: (document.getElementById('fDesc').value || '').trim(),
    image_url:   (document.getElementById('fImg') ? document.getElementById('fImg').value.trim() : ''),
    image_urls:  (window._prodImgUrls || []),
    sizes:       selectedSizes,
    is_new:      document.getElementById('fNew').checked,
  };

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span> Saving...';

  try {
    let result;
    if (editingId) {
      result = await sb.from('products').update(payload).eq('id', editingId);
    } else {
      result = await sb.from('products').insert([payload]);
    }

    console.log('Supabase result:', result);

    if (result.error) {
      const errMsg = result.error.message || result.error.details || result.error.hint || JSON.stringify(result.error);
      // Show detailed error in the page
      showSaveError(errMsg, result.error.code);
      btn.disabled = false;
      btn.textContent = editingId ? '💾 Save Changes' : '✅ Add Product';
    } else {
      notify(editingId ? '✅ Product updated!' : '✅ Product added to website!', 'success');
      // Hide any previous error
      const errBox = document.getElementById('saveErrorBox');
      if (errBox) errBox.style.display = 'none';
      editingId = null;
      await loadProducts();
      showTab('products');
    }
  } catch(e) {
    console.error('Save exception:', e);
    showSaveError(e.message || String(e), 'exception');
    btn.disabled = false;
    btn.textContent = editingId ? '💾 Save Changes' : '✅ Add Product';
  }
}

function showSaveError(msg, code) {
  // Remove old box
  const old = document.getElementById('saveErrorBox');
  if (old) old.remove();

  let hint = '';
  if (code === '42501' || msg.toLowerCase().includes('row-level security') || msg.toLowerCase().includes('permission') || msg.toLowerCase().includes('policy')) {
    hint = `<div style="margin-top:10px;padding:12px;background:rgba(0,0,0,.3);border-radius:6px;font-family:monospace;font-size:11px;color:#fbbf24;line-height:1.8">
      <b style="color:#E8CC6A">Fix: Run this SQL in your Supabase SQL Editor</b><br/><br/>
      -- 1. Disable RLS on products table (easiest fix)<br/>
      ALTER TABLE products DISABLE ROW LEVEL SECURITY;<br/><br/>
      -- OR add a permissive policy:<br/>
      ALTER TABLE products ENABLE ROW LEVEL SECURITY;<br/>
      CREATE POLICY "allow_all" ON products FOR ALL USING (true) WITH CHECK (true);
    </div>`;
  } else if (msg.toLowerCase().includes('does not exist') || msg.toLowerCase().includes('relation')) {
    hint = `<div style="margin-top:10px;padding:12px;background:rgba(0,0,0,.3);border-radius:6px;font-family:monospace;font-size:11px;color:#fbbf24;line-height:1.8">
      <b style="color:#E8CC6A">Fix: Create the products table in Supabase SQL Editor</b><br/><br/>
      CREATE TABLE products (<br/>
      &nbsp;&nbsp;id uuid DEFAULT gen_random_uuid() PRIMARY KEY,<br/>
      &nbsp;&nbsp;name text NOT NULL,<br/>
      &nbsp;&nbsp;category text,<br/>
      &nbsp;&nbsp;subcategory text,<br/>
      &nbsp;&nbsp;brand text,<br/>
      &nbsp;&nbsp;price numeric,<br/>
      &nbsp;&nbsp;stock integer DEFAULT 0,<br/>
      &nbsp;&nbsp;description text,<br/>
      &nbsp;&nbsp;image_url text,<br/>
      &nbsp;&nbsp;colors jsonb DEFAULT '[]',<br/>
      &nbsp;&nbsp;sizes jsonb DEFAULT '[]',<br/>
      &nbsp;&nbsp;is_new boolean DEFAULT false,<br/>
      &nbsp;&nbsp;created_at timestamptz DEFAULT now()<br/>
      );<br/>
      ALTER TABLE products DISABLE ROW LEVEL SECURITY;
    </div>`;
  }

  const box = document.createElement('div');
  box.id = 'saveErrorBox';
  box.style.cssText = 'margin-top:16px;padding:16px;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.4);border-radius:10px;color:#fca5a5;font-size:13px;line-height:1.6';
  box.innerHTML = `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:18px">❌</span><b style="font-family:Cinzel,serif;letter-spacing:.5px">SAVE FAILED</b></div>
    <div style="color:#f87171">${msg}</div>${hint}`;

  // Insert after save buttons
  const btns = document.getElementById('saveBtn');
  if (btns && btns.parentElement) {
    btns.parentElement.parentElement.appendChild(box);
    box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } else {
    document.getElementById('tabContent').appendChild(box);
  }
  notify('❌ Save failed — see error details below', 'error');
}

async function delProduct(id) {
  const p = products.find(x => x.id == id);
  const name = p ? p.name : 'this product';
  showConfirm({
    icon: '🗑',
    title: 'DELETE PRODUCT',
    msg: `Delete "${name}"? This permanently removes it from the database and website.`,
    okLabel: '🗑 Delete',
    okColor: '#f87171',
    onOk: async () => {
      // Optimistic UI
      const row = document.querySelector(`tr[data-pid="${id}"]`);
      if (row) { row.style.transition = 'opacity .25s'; row.style.opacity = '0.3'; }

      try {
        console.log('[delProduct] Attempting delete for id:', id);

        const { error, data, status, statusText } = await sb
          .from('products')
          .delete()
          .eq('id', id)
          .select();   // ← .select() forces Supabase to return deleted rows; empty = RLS blocked it

        console.log('[delProduct] Response:', { error, data, status, statusText });

        if (error) {
          console.error('[delProduct] Supabase error:', error);
          notify('❌ Delete failed: ' + (error.message || JSON.stringify(error)), 'error');
          showDeleteError(error.message || JSON.stringify(error), error.code);
          if (row) row.style.opacity = '1';
          return;
        }

        // If data is empty array, RLS silently blocked the delete (no error, just no rows affected)
        if (Array.isArray(data) && data.length === 0) {
          console.warn('[delProduct] 0 rows deleted — likely RLS blocking anon delete');
          notify('❌ Delete blocked by database policy (RLS). Run the fix below.', 'error');
          showDeleteError('0 rows deleted — Row Level Security is blocking DELETE operations for the anon key.', '42501');
          if (row) row.style.opacity = '1';
          return;
        }

        // Success
        console.log('[delProduct] Deleted successfully:', data);
        products = products.filter(x => x.id != id);
        notify('🗑 Product deleted successfully.', 'info');
        renderProducts();

      } catch(e) {
        console.error('[delProduct] Exception:', e);
        notify('❌ Exception: ' + e.message, 'error');
        if (row) row.style.opacity = '1';
      }
    }
  });
}

function showDeleteError(msg, code) {
  const old = document.getElementById('deleteErrorBox');
  if (old) old.remove();

  const isRLS = code === '42501' || (msg||'').includes('0 rows') || (msg||'').toLowerCase().includes('rls') || (msg||'').toLowerCase().includes('security') || (msg||'').toLowerCase().includes('policy');
  const hint = isRLS ? `
    <div style="margin-top:12px;background:rgba(0,0,0,.35);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;color:#fbbf24;line-height:2;position:relative">
      <button onclick="copyText('rlsFixSQL')" style="position:absolute;top:8px;right:8px;background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#E8CC6A;padding:3px 9px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif">COPY</button>
      <b style="color:#E8CC6A;font-family:'Cinzel',serif;font-size:11px">Run this SQL in Supabase → SQL Editor:</b><br/><br/>
      <span id="rlsFixSQL">-- Fix: Allow DELETE for anon key on products table
ALTER TABLE products DISABLE ROW LEVEL SECURITY;

-- OR keep RLS enabled but add a policy:
-- ALTER TABLE products ENABLE ROW LEVEL SECURITY;
-- DROP POLICY IF EXISTS "allow_delete" ON products;
-- CREATE POLICY "allow_delete" ON products FOR DELETE USING (true);</span>
    </div>` : '';

  const box = document.createElement('div');
  box.id = 'deleteErrorBox';
  box.style.cssText = 'margin:16px 0;padding:16px;background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.4);border-radius:10px;color:#fca5a5;font-size:13px;line-height:1.6';
  box.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <span style="font-size:18px">❌</span>
      <b style="font-family:'Cinzel',serif;letter-spacing:.5px">DELETE FAILED</b>
      <button onclick="this.closest('#deleteErrorBox').remove()" style="margin-left:auto;background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;font-size:16px">✕</button>
    </div>
    <div style="color:#f87171;font-size:12px">${msg}</div>${hint}`;

  const tc = document.getElementById('tabContent');
  if (tc) { tc.insertAdjacentElement('afterbegin', box); box.scrollIntoView({ behavior:'smooth', block:'nearest' }); }
}

    const file = files[i];
    if (file.size > 10 * 1024 * 1024) { notify(`${file.name} too large (max 10MB), skipped.`, 'error'); continue; }
    fill.style.width = Math.round(((i + 0.5) / files.length) * 100) + '%';
    status.textContent = `Uploading ${i + 1} of ${files.length}: ${file.name}`;
    const ext = file.name.split('.').pop().toLowerCase();
    const fileName = `banners/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
    const { data, error } = await sb.storage.from(STORAGE_BUCKET).upload(fileName, file, { cacheControl: '3600', upsert: true });
    if (error) { notify(`Failed: ${file.name} — ${error.message}`, 'error'); continue; }
    const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(fileName);
    pendingBannerUrls.push(urlData.publicUrl);
  }
  fill.style.width = '100%';
  status.textContent = `✅ ${pendingBannerUrls.length} of ${files.length} uploaded!`;
  prevWrap.style.opacity = '1';
  if (pendingBannerUrls.length > 0) {
    prevWrap.innerHTML = `
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px">
        ${pendingBannerUrls.map(url => `<img src="${url}" style="height:80px;width:140px;object-fit:cover;border-radius:6px;border:1px solid rgba(212,175,55,.4)"/>`).join('')}
      </div>
      <p style="color:#4ade80;font-size:12px">${pendingBannerUrls.length} image(s) ready — click Save Banners below</p>`;
    notify(`✅ ${pendingBannerUrls.length} banner image(s) uploaded!`, 'success');
  }
  setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 2000);
}

async function addBanners() {
  if (!pendingBannerUrls.length) { notify('Please upload at least one image first.', 'error'); return; }
  const btn = document.getElementById('addBannerBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner-sm"></span> Saving...';
  const title    = (document.getElementById('bTitle').value || '').trim() || null;
  const subtitle = (document.getElementById('bSubtitle').value || '').trim() || null;
  const baseOrder = parseInt(document.getElementById('bOrder').value || '0') || 0;
  const rows = pendingBannerUrls.map((url, idx) => ({
    image_url: url, title, subtitle,
    sort_order: baseOrder + idx,

  const { error } = await sb.from('banner_images').insert(rows);

  renderBannersTab();
}

  const { data, error } = await sb.from('orders').select('*').order('created_at', { ascending: false });

  orders = data || [];

    badge.textContent = newCount;

function statusColor(s) {
  const map = { New:'#7C3AED', Processing:'#D97706', Shipped:'#2563EB', Delivered:'#16A34A', Cancelled:'#DC2626' };

}
function payColor(s) {
  return s === 'Paid' ? '#16A34A' : s === 'Failed' ? '#DC2626' : '#D97706';
}

function getFilteredOrders() {
  let list = orders;
  if (_ordersFilter) {

      (o.phone||'').includes(q) ||

      (o.state||'').toLowerCase().includes(q) ||
      (o.pin_code||'').includes(q)

  if (_ordersPayFilter) list = list.filter(o => o.payment_status === _ordersPayFilter);

}

// ── DELETE ORDER ──
function confirmDeleteOrder(id, name) {
  showConfirm({
    icon: '🗑',
    title: 'DELETE ORDER',
    msg: `Delete order from "${name}"? This permanently removes it from the database and cannot be undone.`,
    okLabel: '🗑 Delete',
    okColor: '#f87171',
    onOk: () => deleteOrder(id),
  });
}

async function deleteOrder(id) {
  if (!id) { notify('❌ Invalid order ID.', 'error'); return; }

  const row = document.getElementById('orow-' + id);

  // Show loading state on the delete button instead of instant fade
  const delBtn = row ? row.querySelector('.order-del-btn') : null;
  if (delBtn) { delBtn.disabled = true; delBtn.textContent = '⏳'; }

  try {
    // Step 1: verify the row actually exists in our local state
    const exists = orders.some(o => o.id === id);
    if (!exists) {
      notify('⚠️ Order not found in local state — refreshing...', 'error');
      await loadOrders();
      _renderOrdersTable();
      return;
    }

    // Step 2: delete with .select() so Supabase returns affected rows
    // Without .select(), RLS blocks are SILENT — no error, just 0 rows deleted
    const { data, error } = await sb
      .from('orders')
      .delete()
      .eq('id', id)
      .select('id');   // ← critical: forces response even when RLS blocks

    // Step 3: handle Supabase error
    if (error) {
      console.error('[deleteOrder] Supabase error:', error);
      notify('❌ Delete failed: ' + (error.message || JSON.stringify(error)), 'error');
      if (delBtn) { delBtn.disabled = false; delBtn.textContent = '🗑'; }
      return;
    }

    // Step 4: check if any row was actually deleted
    // If RLS blocks silently, data = [] with no error
    if (!data || data.length === 0) {
      console.warn('[deleteOrder] 0 rows deleted — RLS is silently blocking. Run: ALTER TABLE orders DISABLE ROW LEVEL SECURITY;');
      notify('❌ Delete blocked by Supabase RLS policy. Go to ⚙️ DB Setup → run the Orders Fix SQL.', 'error');
      if (delBtn) { delBtn.disabled = false; delBtn.textContent = '🗑'; }
      return;
    }

    // Step 5: SUCCESS — animate row out, update state
    if (row) {
      row.style.transition = 'opacity .25s, transform .25s';
      row.style.opacity = '0';
      row.style.transform = 'translateX(12px)';
    }

    orders = orders.filter(o => o.id !== id);
    notify('🗑 Order deleted successfully.', 'success');

    // Update sidebar badge
    const badge = document.getElementById('ordersCountBadge');
    if (badge) {
      const newCount = orders.filter(o => o.order_status === 'New').length;
      badge.textContent = newCount;
      badge.style.display = newCount > 0 ? 'inline' : 'none';
    }

    // Re-render table after animation (keeps search/filter state)
    setTimeout(_renderOrdersTable, 300);

  } catch (e) {
    console.error('[deleteOrder] Exception:', e);
    notify('❌ Exception: ' + e.message, 'error');
    if (delBtn) { delBtn.disabled = false; delBtn.textContent = '🗑'; }
  }
}

async function updateOrderStatus(id, value, field) {
  const update = {};
  update[field] = value;
  const { error } = await sb.from('orders').update(update).eq('id', id);
  if (error) { notify('Error updating order: ' + error.message, 'error'); return; }
  // Update local state without full reload
  const o = orders.find(x => x.id === id);
  if (o) o[field] = value;
  notify('✅ Order status updated!', 'success');
  // Refresh badge
  const badge = document.getElementById('ordersCountBadge');
  if (badge) {
    const newCount = orders.filter(o => o.order_status === 'New').length;
    badge.textContent = newCount;
    badge.style.display = newCount > 0 ? 'inline' : 'none';
  }
}

      <button onclick="copySQL('sqlThaanTable')" style="position:absolute;top:10px;right:10px;background:rgba(212,175,55,.15);border:1px solid rgba(212,175,55,.3);color:#E8CC6A;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-family:'Cinzel',serif">COPY</button>
      <pre id="sqlThaanTable" style="white-space:pre-wrap;margin:0;color:#a5f3fc">-- Create app_settings table for dynamic config
CREATE TABLE IF NOT EXISTS app_settings (
  key text PRIMARY KEY,
  value text NOT NULL,
  updated_at timestamptz DEFAULT now()
);

-- Disable RLS so anon key can read
ALTER TABLE app_settings DISABLE ROW LEVEL SECURITY;

-- Insert default Thaan password (change 'libas2024' to your desired password)
INSERT INTO app_settings (key, value)
VALUES ('thaan_password', 'libas2024')
ON CONFLICT (key) DO NOTHING;</pre>
    </div>
  </div>`;

  // Load current password from DB
  await _loadCurrentThaanPwd();
}

let _thaanPwdCurrent = '';
let _thaanPwdVisible = false;

async function _loadCurrentThaanPwd() {
  const statusEl = document.getElementById('thaanPwdStatus');
  try {
    const { data, error } = await sb.from('app_settings').select('value').eq('key','thaan_password').single();
    if (error) throw error;
    _thaanPwdCurrent = data.value;
    if (statusEl) statusEl.innerHTML = `<span style="color:#86efac">✅ Password loaded from database</span>`;
    const valEl = document.getElementById('currentPwdValue');
    if (valEl) { valEl.setAttribute('data-pwd', _thaanPwdCurrent); }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<span style="color:#f87171">⚠️ Could not load password — run the SQL above first, then refresh this tab.</span>`;
  }
}

function togglePwdVisibility() {
  _thaanPwdVisible = !_thaanPwdVisible;
  const valEl = document.getElementById('currentPwdValue');
  const btn   = document.getElementById('togglePwdBtn');
  if (!valEl) return;
  if (_thaanPwdVisible) {
    valEl.style.filter = 'none';
    valEl.textContent  = _thaanPwdCurrent || '(not set)';
    if (btn) btn.textContent = 'HIDE';
  } else {
    valEl.style.filter = 'blur(4px)';
    valEl.textContent  = '••••••••';
    if (btn) btn.textContent = 'SHOW';
  }
}

async function saveThaanPassword() {
  const newPwd  = (document.getElementById('newThaanPwd')?.value || '').trim();
  const confPwd = (document.getElementById('confirmThaanPwd')?.value || '').trim();
  if (!newPwd)             { notify('Please enter a new password.', 'error'); return; }
  if (newPwd.length < 4)   { notify('Password must be at least 4 characters.', 'error'); return; }
  if (newPwd !== confPwd)  { notify('Passwords do not match.', 'error'); return; }

  const btn = document.getElementById('savePwdBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

  try {
    const { error } = await sb.from('app_settings')
      .upsert({ key: 'thaan_password', value: newPwd, updated_at: new Date().toISOString() }, { onConflict: 'key' });
    if (error) throw error;
    _thaanPwdCurrent = newPwd;
    notify('🔑 Thaan password updated successfully!', 'success');
    document.getElementById('newThaanPwd').value = '';
    document.getElementById('confirmThaanPwd').value = '';
    // Refresh display
    const valEl = document.getElementById('currentPwdValue');
    if (valEl) {
      valEl.setAttribute('data-pwd', newPwd);
      if (_thaanPwdVisible) { valEl.textContent = newPwd; }
    }
    const statusEl = document.getElementById('thaanPwdStatus');
    if (statusEl) statusEl.innerHTML = `<span style="color:#86efac">✅ Password updated — storefront will use this immediately.</span>`;
  } catch(e) {
    notify('Error saving password: ' + e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '🔑 UPDATE PASSWORD'; }
  }
}

// ── NOTIFY ──
function notify(msg, type = 'info') {
  const cols = { success: ['#14532d','#86efac','#22c55e'], error: ['#450a0a','#f87171','#ef4444'], info: ['#1c1a36','#a78bfa','#7c3aed'] };
  const [bg, text, border] = cols[type] || cols.info;
  const el = document.createElement('div');
  el.className = 'notify';
  el.style.cssText += `background:${bg};color:${text};border-color:${border}40;transition:opacity .4s`;
  const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
  el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; }, 3200);
  setTimeout(() => el.remove(), 3600);
}

// ── INIT ──
initSelections();
init();
</script>
